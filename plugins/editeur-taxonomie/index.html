<style>
/* Reset minimal */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Layout principal */

/* Toolbar */

/* Barre d'onglets machines */
.te-tabs {

/* =====================================================
   ETAT
   ===================================================== */
var LS_KEY = 'taxo_editeur_draft';
var LS_GH  = 'taxo_editeur_github';
var taxo;
var workspace = null;
var activeMachineKey = null;
var chargementEnCours = false;

var ETATS_DEFAUT = ['Bon', 'Moyen', 'Dégradé', "Début d'oxydation", 'Oxydation avancée'];

/* Deep clone simple */
function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

/* Helper : clés des machines (ignore la clé réservée _etats) */
function machineKeys() {
  return Object.keys(taxo).filter(function(k) { return k !== '_etats'; });
}

/* Migration ancien format (strings -> objets {label, actions}) */
function migrerSiNecessaire(t) {
  Object.keys(t).forEach(function(mk) {
    if (mk === '_etats') { return; }
    t[mk].stations.forEach(function(s) {
      s.subcats.forEach(function(sc) {
        sc.elements = sc.elements.map(function(e) {
          if (typeof e === 'string') {
            return { label: e, actions: ['controle', 'nettoyage', 'remplacement'] };
          }
          return e;
        });
      });
    });
  });
  return t;
}

/* Chargement initial */
function charger() {
  var saved = localStorage.getItem(LS_KEY);
  taxo = saved ? migrerSiNecessaire(JSON.parse(saved)) : clone(TAXO_DEFAUT);
  if (!taxo._etats || !Array.isArray(taxo._etats)) {
    taxo._etats = clone(ETATS_DEFAUT);
  }
}

/* Sauvegarde auto */
function sauvegarder() {
  localStorage.setItem(LS_KEY, JSON.stringify(taxo));
}

/* =====================================================

var toast = document.getElementById('te-toast');
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'te-toast ' + (type || 'info');
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

/* =====================================================
   SERIALISATION JS
   ===================================================== */
function serializerTaxoJS(t) {
  var lines = ['  var TAXONOMIE = {'];

  /* États de contrôle en tête, sur une seule ligne */
  var etats = (t._etats && Array.isArray(t._etats)) ? t._etats : ETATS_DEFAUT;
  var etatsStr = etats.map(function(e) { return JSON.stringify(e); }).join(', ');
  lines.push('    _etats: [' + etatsStr + '],');

  /* Machines (on ignore la clé réservée _etats) */
  var keys = Object.keys(t).filter(function(k) { return k !== '_etats'; });
  keys.forEach(function(k, ki, arr) {
    var m = t[k];
    lines.push('    ' + k + ': {');
    lines.push('      label: ' + JSON.stringify(m.label) + ',');
    lines.push('      stations: [');
    m.stations.forEach(function(s, si, sarr) {
      lines.push('        {');
      lines.push('          label: ' + JSON.stringify(s.label) + ',');
      lines.push('          subcats: [');
      s.subcats.forEach(function(sc, sci, scarr) {
        var elemStr = sc.elements.map(function(e) {
          var actionsStr = (e.actions || []).map(function(a) { return JSON.stringify(a); }).join(', ');
          return '{ label: ' + JSON.stringify(e.label) + ', actions: [' + actionsStr + '] }';
        }).join(', ');
        var comma = sci < scarr.length - 1 ? ',' : '';
        lines.push('            { label: ' + JSON.stringify(sc.label) + ', elements: [' + elemStr + '] }' + comma);
      });
      lines.push('          ]');
      lines.push('        }' + (si < sarr.length - 1 ? ',' : ''));
    });
    lines.push('      ]');
    lines.push('    }' + (ki < arr.length - 1 ? ',' : ''));
  });
  lines.push('  };');
  return lines.join('\n');
}

  document.getElementById('gh-path').value   = cfg.path   || 'plugins/rapport-intervention/index.html';
}

/* =====================================================
   ÉTATS DE CONTRÔLE — SIDEBAR
   ===================================================== */
function renderEtats() {
  var list = document.getElementById('te-etats-list');
  if (!list) { return; }
  list.innerHTML = '';

  taxo._etats.forEach(function(etatVal, i) {
    var row = document.createElement('div');
    row.className = 'te-etat-row';

    var input = document.createElement('input');
    input.type = 'text';
    input.value = etatVal;
    var commit = function() {
      taxo._etats[i] = input.value;
      sauvegarder();
    };
    input.addEventListener('change', commit);
    input.addEventListener('blur', commit);

    var btnUp = document.createElement('button');
    btnUp.type = 'button';
    btnUp.textContent = '↑';
    btnUp.title = 'Monter';
    btnUp.addEventListener('click', function() {
      if (i <= 0) { return; }
      var tmp = taxo._etats[i - 1];
      taxo._etats[i - 1] = taxo._etats[i];
      taxo._etats[i] = tmp;
      sauvegarder();
      renderEtats();
    });

    var btnDown = document.createElement('button');
    btnDown.type = 'button';
    btnDown.textContent = '↓';
    btnDown.title = 'Descendre';
    btnDown.addEventListener('click', function() {
      if (i >= taxo._etats.length - 1) { return; }
      var tmp = taxo._etats[i + 1];
      taxo._etats[i + 1] = taxo._etats[i];
      taxo._etats[i] = tmp;
      sauvegarder();
      renderEtats();
    });

    var btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.textContent = '✕';
    btnDel.title = 'Supprimer';
    btnDel.addEventListener('click', function() {
      if (taxo._etats.length <= 1) {
        showToast('Impossible de supprimer le dernier état', 'error');
        return;
      }
      taxo._etats.splice(i, 1);
      sauvegarder();
      renderEtats();
    });

    row.appendChild(input);
    row.appendChild(btnUp);
    row.appendChild(btnDown);
    row.appendChild(btnDel);
    list.appendChild(row);
  });
}

document.getElementById('te-etats-add').addEventListener('click', function() {
  taxo._etats.push('Nouvel état');
  sauvegarder();
  renderEtats();
});

/* =====================================================
   PUSH GITHUB
   ===================================================== */
document.getElementById('te-push').addEventListener('click', async function() {
  var cfg = lireConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo || !cfg.path) {
    showToast('Config GitHub incomplète', 'error');
    return;
  }

  showToast('Lecture du fichier en cours…', 'info');

  var apiBase = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + cfg.path;
  var headers = {
    'Authorization': 'token ' + cfg.token,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };

  try {
    /* 1 — Lire le fichier actuel */
    var getResp = await fetch(apiBase + '?ref=' + encodeURIComponent(cfg.branch), { headers: headers });
    if (!getResp.ok) throw new Error('Lecture GitHub : ' + getResp.status + ' ' + getResp.statusText);
    var fileData = await getResp.json();

    /* 2 — Decoder */
    var content = atob(fileData.content.replace(/\n/g, ''));
    var sha = fileData.sha;

    /* 3 — Remplacer TAXONOMIE */
    var newBlock = serializerTaxoJS(taxo);
    var regex = /var TAXONOMIE = \{[\s\S]*?\n  \};/;
    if (!regex.test(content)) {
      throw new Error('Bloc TAXONOMIE introuvable dans le fichier. Vérifiez le chemin.');
    }
    var newContent = content.replace(regex, newBlock);

    /* 4 — Encoder et pousser */
    var encoded = btoa(unescape(encodeURIComponent(newContent)));
    var putResp = await fetch(apiBase, {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify({
        message: 'chore(taxonomie): mise a jour via editeur integre',
        content: encoded,
        sha: sha,
        branch: cfg.branch
      })
    });
    if (!putResp.ok) {
      var errData = await putResp.json();
      throw new Error('Push GitHub : ' + putResp.status + ' — ' + (errData.message || putResp.statusText));
    }

    showToast('Push GitHub réussi !', 'success');
  } catch(err) {
    console.error('[TaxoEditor] Push error:', err);
    showToast('Erreur : ' + err.message, 'error');
  }
});

/* =====================================================
   BLOCKLY — CHARGEMENT ET INITIALISATION
   ===================================================== */
function chargerBlocklyEtInit() {
  if (window.Blockly) {
    initBlockly();
    return;
  }
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/blockly@10/blockly.min.js';
  script.onload = function() { initBlockly(); };
  script.onerror = function() {
    document.getElementById('te-workspace').innerHTML = '<p style="color:red;padding:20px;">Erreur chargement Blockly. Vérifiez votre connexion internet.</p>';
  };
  document.head.appendChild(script);
}

function initBlockly() {
  /* 1. Enregistrer les blocs custom */
  blockDefs.forEach(function(def) {
    Blockly.Blocks[def.type] = {
      init: function() { this.jsonInit(def); }
    };
  });

  /* 2. Injecter le workspace dans #te-workspace */
  var theme = (Blockly.Themes && Blockly.Themes.Zelos)
    ? Blockly.Themes.Zelos
    : (Blockly.Themes && Blockly.Themes.Classic ? Blockly.Themes.Classic : undefined);

  var workspaceConfig = {
    toolbox: toolbox,
    scrollbars: true,
    trashcan: true,
    move: { scrollbars: true, drag: true, wheel: true },
    zoom: { controls: true, wheel: true, startScale: 0.9 }
  };
  if (theme) workspaceConfig.theme = theme;

  workspace = Blockly.inject('te-workspace', workspaceConfig);

  /* 3. Construire les onglets et afficher la première machine */
  renderTabs();
  switchMachine(machineKeys()[0]);

  /* 4. Écouter les changements pour sauvegarder (machine active uniquement) */
  workspace.addChangeListener(function(event) {
    if (chargementEnCours || event.isUiEvent) return;
    if (!activeMachineKey) return;
    taxo[activeMachineKey].stations = extraireStationsDepuisWorkspace(workspace);
    sauvegarder();
  });

  /* 5. Bouton Reset : réinitialiser le workspace */
  document.getElementById('te-reset').addEventListener('click', function() {
    if (confirm('Réinitialiser vers la taxonomie par défaut ? (les modifications non poussées seront perdues)')) {
      taxo = clone(TAXO_DEFAUT);
      sauvegarder();
      activeMachineKey = null;
      renderTabs();
      switchMachine(machineKeys()[0]);
      showToast('Taxonomie réinitialisée', 'info');
    }
  });

  return workspace;
}

/* =====================================================
   ONGLETS MACHINES
   ===================================================== */

/* Translittération basique + slug unique contre les clés existantes */
function slugifyKey(label) {
  var base = String(label).toLowerCase()
    .replace(/[àâä]/g, 'a')
    .replace(/[éèêë]/g, 'e')
    .replace(/[îï]/g, 'i')
    .replace(/[ôö]/g, 'o')
    .replace(/[ùûü]/g, 'u')
    .replace(/[ç]/g, 'c')
    .replace(/\s+/g, '_')
    .replace(/[^a-z0-9_]/g, '');
  if (!base) { base = 'machine'; }

  var existantes = Object.keys(taxo).filter(function(k) { return k !== '_etats'; });
  if (existantes.indexOf(base) === -1) { return base; }
  var n = 2;
  while (existantes.indexOf(base + '_' + n) !== -1) { n++; }
  return base + '_' + n;
}

/* Reconstruit la barre d'onglets depuis machineKeys() */
function renderTabs() {
  var tabsEl = document.getElementById('te-tabs');
  if (!tabsEl) { return; }
  tabsEl.innerHTML = '';

  machineKeys().forEach(function(key) {
    var tab = document.createElement('button');
    tab.type = 'button';
    tab.className = 'te-tab' + (key === activeMachineKey ? ' active' : '');

    var lbl = document.createElement('span');
    lbl.textContent = taxo[key].label || key;
    lbl.addEventListener('click', function() { switchMachine(key); });

    var btnRename = document.createElement('button');
    btnRename.type = 'button';
    btnRename.className = 'te-tab-rename';
    btnRename.textContent = '✎';
    btnRename.title = 'Renommer';
    btnRename.addEventListener('click', function(e) {
      e.stopPropagation();
      renommerMachine(key);
    });

    var btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.className = 'te-tab-del';
    btnDel.textContent = '✕';
    btnDel.title = 'Supprimer';
    btnDel.addEventListener('click', function(e) {
      e.stopPropagation();
      supprimerMachine(key);
    });

    tab.appendChild(lbl);
    tab.appendChild(btnRename);
    tab.appendChild(btnDel);
    tabsEl.appendChild(tab);
  });

  var btnAdd = document.createElement('button');
  btnAdd.type = 'button';
  btnAdd.className = 'te-tab-add';
  btnAdd.textContent = '+ Machine';
  btnAdd.addEventListener('click', function() { ajouterMachine(); });
  tabsEl.appendChild(btnAdd);
}

/* Bascule sur la machine `key` : sauve la précédente, charge la nouvelle */
function switchMachine(key) {
  if (!key) { return; }

  /* 1. Sauvegarder la machine active courante */
  if (activeMachineKey && !chargementEnCours && taxo[activeMachineKey]) {
    taxo[activeMachineKey].stations = extraireStationsDepuisWorkspace(workspace);
    sauvegarder();
  }

  /* 2. Nouvelle machine active */
  activeMachineKey = key;

  /* 3. Recharger le workspace pour cette machine uniquement */
  chargementEnCours = true;
  workspace.clear();
  chargerMachineEnBlocs(workspace, key);
  chargementEnCours = false;

  /* 4. Rafraîchir les onglets */
  renderTabs();
}

/* Ajoute une machine et bascule dessus */
function ajouterMachine() {
  var nom = prompt('Nom de la nouvelle machine :');
  if (!nom || !nom.trim()) { return; }
  var key = slugifyKey(nom.trim());
  taxo[key] = { label: nom.trim(), stations: [] };
  sauvegarder();
  switchMachine(key);
}

/* Renomme une machine (le label uniquement — la clé reste stable) */
function renommerMachine(key) {
  var nv = prompt('Nouveau nom :', taxo[key].label);
  if (nv && nv.trim()) {
    taxo[key].label = nv.trim();
    sauvegarder();
    renderTabs();
  }
}

/* Supprime une machine (jamais la dernière) */
function supprimerMachine(key) {
  if (machineKeys().length <= 1) {
    showToast('Impossible de supprimer la dernière machine', 'error');
    return;
  }
  if (confirm('Supprimer la machine "' + taxo[key].label + '" ?')) {
    delete taxo[key];
    sauvegarder();
    var reste = machineKeys();
    activeMachineKey = null;
    switchMachine(reste[0]);
  }
}

/* =====================================================
   BLOCKLY — CHARGEMENT D'UNE MACHINE (stations top-level)
   ===================================================== */
function chargerMachineEnBlocs(ws, key) {
  var machine = taxo[key];
  if (!machine) { return; }

  var prevStationBlock = null;

  machine.stations.forEach(function(station) {
    var sBlock = ws.newBlock('taxo_station');
    sBlock.setFieldValue(station.label, 'LABEL');
    sBlock.initSvg();
    sBlock.render();

    if (!prevStationBlock) {
      /* Première station : top-block positionné dans la vue */
      sBlock.moveBy(20, 20);
    } else {
      var prevConn = prevStationBlock.nextConnection;
      if (prevConn && sBlock.previousConnection) prevConn.connect(sBlock.previousConnection);
    }

    /* Subcats */
    var prevSubcatBlock = null;
    (station.subcats || []).forEach(function(subcat) {
      var scBlock = ws.newBlock('taxo_subcat');
      scBlock.setFieldValue(subcat.label, 'LABEL');
      scBlock.initSvg();
      scBlock.render();

      if (!prevSubcatBlock) {
        var stmtConn = sBlock.getInput('SUBCATS').connection;
        if (stmtConn && scBlock.previousConnection) stmtConn.connect(scBlock.previousConnection);
      } else {
        var prevConnSc = prevSubcatBlock.nextConnection;
        if (prevConnSc && scBlock.previousConnection) prevConnSc.connect(scBlock.previousConnection);
      }

      /* Éléments */
      var prevElemBlock = null;
      (subcat.elements || []).forEach(function(elem) {
        var eBlock = ws.newBlock('taxo_element');
        eBlock.setFieldValue(elem.label || '', 'LABEL');
        eBlock.initSvg();
        eBlock.render();

        if (!prevElemBlock) {
          var stmtConnE = scBlock.getInput('ELEMENTS').connection;
          if (stmtConnE && eBlock.previousConnection) stmtConnE.connect(eBlock.previousConnection);
        } else {
          var prevConnE = prevElemBlock.nextConnection;
          if (prevConnE && eBlock.previousConnection) prevConnE.connect(eBlock.previousConnection);
        }

        /* Blocs action */
        var prevActionBlock = null;
        (elem.actions || []).forEach(function(actionId) {
          var aBlock = ws.newBlock('taxo_action');
          aBlock.setFieldValue(actionId, 'ACTION_TYPE');
          aBlock.initSvg();
          aBlock.render();

          if (!prevActionBlock) {
            var actionsConn = eBlock.getInput('ACTIONS').connection;
            if (actionsConn && aBlock.previousConnection) actionsConn.connect(aBlock.previousConnection);
          } else {
            if (prevActionBlock.nextConnection && aBlock.previousConnection)
              prevActionBlock.nextConnection.connect(aBlock.previousConnection);
          }
          prevActionBlock = aBlock;
        });

        prevElemBlock = eBlock;
      });

      prevSubcatBlock = scBlock;
    });

    prevStationBlock = sBlock;
  });

  ws.scrollCenter();
}

/* =====================================================
   BLOCKLY — EXTRACTION DES STATIONS DEPUIS LE WORKSPACE
   ===================================================== */
function extraireStationsDepuisWorkspace(ws) {
  var stations = [];
  var topBlocks = ws.getTopBlocks(true);

  topBlocks.forEach(function(block) {
    if (block.type !== 'taxo_station') return;

    var stationBlock = block;
    while (stationBlock) {
      if (stationBlock.type === 'taxo_station') {
        var subcats = [];
        var subcatsInput = stationBlock.getInput('SUBCATS');
        if (subcatsInput && subcatsInput.connection && subcatsInput.connection.targetBlock()) {
          var subcatBlock = subcatsInput.connection.targetBlock();
          while (subcatBlock) {
            if (subcatBlock.type === 'taxo_subcat') {
              var elements = [];
              var elemsInput = subcatBlock.getInput('ELEMENTS');
              if (elemsInput && elemsInput.connection && elemsInput.connection.targetBlock()) {
                var elemBlock = elemsInput.connection.targetBlock();
                while (elemBlock) {
                  if (elemBlock.type === 'taxo_element') {
                    var actions = [];
                    var actionsInput = elemBlock.getInput('ACTIONS');
                    if (actionsInput && actionsInput.connection && actionsInput.connection.targetBlock()) {
                      var actionBlock = actionsInput.connection.targetBlock();
                      while (actionBlock) {
                        if (actionBlock.type === 'taxo_action') {
                          actions.push(actionBlock.getFieldValue('ACTION_TYPE'));
                        }
                        actionBlock = actionBlock.nextConnection && actionBlock.nextConnection.targetBlock();
                      }
                    }
                    elements.push({ label: elemBlock.getFieldValue('LABEL') || '', actions: actions });
                  }
                  elemBlock = elemBlock.nextConnection && elemBlock.nextConnection.targetBlock();
                }
              }
              subcats.push({ label: subcatBlock.getFieldValue('LABEL') || '', elements: elements });
            }
            subcatBlock = subcatBlock.nextConnection && subcatBlock.nextConnection.targetBlock();
          }
        }
        stations.push({ label: stationBlock.getFieldValue('LABEL') || '', subcats: subcats });
      }
      stationBlock = stationBlock.nextConnection && stationBlock.nextConnection.targetBlock();
    }
  });

  return stations;
}

/* =====================================================
   INIT
   ===================================================== */
charger();
chargerConfig();
chargerBlocklyEtInit();

})();
