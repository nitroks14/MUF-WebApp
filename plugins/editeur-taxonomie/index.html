/* Clรฉs rรฉservรฉes : anciennes clรฉs legacy, jamais traitรฉes comme des machines.
   Conservรฉes pour ignorer/nettoyer proprement d'รฉventuelles donnรฉes anciennes. */
var CLES_RESERVEES = ['_etats', '_etatsDefauts'];
function estCleReservee(k) { return CLES_RESERVEES.indexOf(k) !== -1; }

/* Deep clone simple */
function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

/* Helper : clรฉs des machines (ignore les clรฉs rรฉservรฉes legacy) */
function machineKeys() {
  return Object.keys(taxo).filter(function(k) { return !estCleReservee(k); });
}

/* Migration ancien format :
   - supprime les clรฉs rรฉservรฉes legacy (_etats, _etatsDefauts) si prรฉsentes
   - รฉlรฉments string -> objets {label, actions}
   - actions string -> objets {type}
   - action.etats sous forme de tableau (ancien bloc รtat) -> chaรฎne "a/b/c" */
function migrerSiNecessaire(t) {
  /* 1. Nettoyage des clรฉs rรฉservรฉes legacy */
  CLES_RESERVEES.forEach(function(k) {
    if (Object.prototype.hasOwnProperty.call(t, k)) { delete t[k]; }
  });

  /* 2. Migration des machines / รฉlรฉments / actions */
  Object.keys(t).forEach(function(mk) {
    if (estCleReservee(mk)) { return; }
    (t[mk].stations || []).forEach(function(s) {
      (s.subcats || []).forEach(function(sc) {
        sc.elements = (sc.elements || []).map(function(e) {
          if (typeof e === 'string') {
            return { label: e, actions: [{ type: 'controle' }, { type: 'nettoyage' }, { type: 'remplacement' }] };
          }
          e.actions = (e.actions || []).map(function(a) {
            if (typeof a === 'string') { return { type: a }; }
            /* etats en tableau (ancien format bloc รtat) -> chaรฎne slash-sรฉparรฉe */
            if (Array.isArray(a.etats)) {
              var s = a.etats.map(function(x) { return String(x).trim(); })
                             .filter(function(x) { return x; }).join('/');
              if (s) { a.etats = s; } else { delete a.etats; }
            } else if (typeof a.etats === 'string' && !a.etats.trim()) {
              delete a.etats;
            }
            return a;
          });
          return e;
        });
      });
    });
  });
  return t;
}

/* Chargement initial */

/* =====================================================
   SERIALISATION JS
   ===================================================== */
/* Sรฉrialise une action en objet compact :
   { type: "x" } / { type: "x", note: "n" } / { type: "x", note: "n", etats: "a/b/c" }
   etats = chaรฎne brute slash-sรฉparรฉe (dรฉcoupรฉe cรดtรฉ rapport en menu dรฉroulant). */
function serializerAction(a) {
  var s = '{ type: ' + JSON.stringify(a.type);
  if (typeof a.note === 'string' && a.note.trim()) {
    s += ', note: ' + JSON.stringify(a.note.trim());
  }
  if (typeof a.etats === 'string' && a.etats.trim()) {
    s += ', etats: ' + JSON.stringify(a.etats.trim());
  }
  return s + ' }';
}

function serializerTaxoJS(t) {
  var lines = ['  var TAXONOMIE = {'];

  /* Machines (on ignore les clรฉs rรฉservรฉes legacy) */
  var keys = Object.keys(t).filter(function(k) { return !estCleReservee(k); });
  keys.forEach(function(k, ki, arr) {
    var m = t[k];
    lines.push('    ' + k + ': {');
    lines.push('      label: ' + JSON.stringify(m.label) + ',');
    lines.push('      stations: [');
    m.stations.forEach(function(s, si, sarr) {
      lines.push('        {');
      lines.push('          label: ' + JSON.stringify(s.label) + ',');
      lines.push('          subcats: [');
      s.subcats.forEach(function(sc, sci, scarr) {
        var elemStr = sc.elements.map(function(e) {
          var actionsStr = (e.actions || []).map(serializerAction).join(', ');
          return '{ label: ' + JSON.stringify(e.label) + ', actions: [' + actionsStr + '] }';
        }).join(', ');
        var comma = sci < scarr.length - 1 ? ',' : '';
        lines.push('            { label: ' + JSON.stringify(sc.label) + ', elements: [' + elemStr + '] }' + comma);
      });
      lines.push('          ]');
      lines.push('        }' + (si < sarr.length - 1 ? ',' : ''));
    });
    lines.push('      ]');
    lines.push('    }' + (ki < arr.length - 1 ? ',' : ''));
  });
  lines.push('  };');
  return lines.join('\n');
}

/* =====================================================
   PUSH GITHUB (#2 โ garde anti double-soumission + gestion 409)
   ===================================================== */
var pushEnCours = false;

/* Dรฉcode du base64 (rรฉponse GitHub) en vraie chaรฎne UTF-8.
   atob() seul renvoie une chaรฎne binaire Latin-1 : les octets UTF-8 multi-octets
   (ex. รฉ = 0xC3 0xA9) deviendraient 2 caractรจres et seraient rรฉ-encodรฉs par
   btoa(unescape(encodeURIComponent(...))) โ double encodage โ mojibake. */
function decoderBase64UTF8(b64) {
  var binaire = atob((b64 || '').replace(/\n/g, ''));
  var octets = new Uint8Array(binaire.length);
  for (var i = 0; i < binaire.length; i++) { octets[i] = binaire.charCodeAt(i); }
  return new TextDecoder('utf-8').decode(octets);
}

/* Lit le sha courant du fichier sur la branche */
async function lireShaCourant(apiBase, headers, branch) {
  var resp = await fetch(apiBase + '?ref=' + encodeURIComponent(branch), { headers: headers });
  if (!resp.ok) { throw new Error('Lecture GitHub : ' + resp.status + ' ' + resp.statusText); }
  var data = await resp.json();
  return { sha: data.sha, content: decoderBase64UTF8(data.content) };
}

/* Effectue le PUT ; renvoie l'objet Response sans throw sur 409 (gรฉrรฉ par l'appelant) */
async function envoyerPut(apiBase, headers, encoded, sha, branch) {
  return fetch(apiBase, {
    method: 'PUT',
    headers: headers,
    body: JSON.stringify({
      message: 'chore(taxonomie): mise a jour via editeur integre',
      content: encoded,
      sha: sha,
      branch: branch
    })
  });
}

async function gererPush() {
  if (pushEnCours) { return; }
  pushEnCours = true;

  var btn = document.getElementById('te-push');
  btn.disabled = true;
  btn.style.opacity = '0.6';

  try {
    var cfg = lireConfig();
    if (!cfg.token || !cfg.owner || !cfg.repo || !cfg.path) {
      showToast('Config GitHub incomplรจte', 'error');
      return;
    }

    showToast('Lecture du fichier en coursโฆ', 'info');

    var apiBase = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + cfg.path;
    var headers = {
      'Authorization': 'token ' + cfg.token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };

    /* 1 โ Lire le fichier actuel (sha + contenu) */
    var fichier = await lireShaCourant(apiBase, headers, cfg.branch);

    /* 2 โ Remplacer le bloc TAXONOMIE */
    var newBlock = serializerTaxoJS(taxo);
    var regex = /var TAXONOMIE = \{[\s\S]*?\n  \};/;
    if (!regex.test(fichier.content)) {
      throw new Error('Bloc TAXONOMIE introuvable dans le fichier. Vรฉrifiez le chemin.');
    }
    var newContent = fichier.content.replace(regex, newBlock);
    var encoded = btoa(unescape(encodeURIComponent(newContent)));

    /* 3 โ PUT (avec un seul retry en cas de 409 Conflict : sha pรฉrimรฉ) */
    var putResp = await envoyerPut(apiBase, headers, encoded, fichier.sha, cfg.branch);

    if (putResp.status === 409) {
      /* sha pรฉrimรฉ : re-GET du sha ร  jour et nouvelle tentative unique */
      var frais = await lireShaCourant(apiBase, headers, cfg.branch);
      var newContent2 = frais.content.replace(regex, newBlock);
      var encoded2 = btoa(unescape(encodeURIComponent(newContent2)));
      putResp = await envoyerPut(apiBase, headers, encoded2, frais.sha, cfg.branch);
    }

    if (!putResp.ok) {
      var errData = {};
      try { errData = await putResp.json(); } catch (e) {}
      throw new Error('Push GitHub : ' + putResp.status + ' โ ' + (errData.message || putResp.statusText));
    }

    showToast('Push GitHub rรฉussi !', 'success');
  } catch (err) {
    console.error('[TaxoEditor] Push error:', err);
    showToast('Erreur : ' + err.message, 'error');
  } finally {
    pushEnCours = false;
    btn.disabled = false;
    btn.style.opacity = '';
  }
}

/* Attache unique : protรฉgรฉe contre un double-binding en cas de rรฉinjection du plugin */

function chargerBlocklyEtInit() {
  if (window.Blockly) {
    initBlockly();
    return;
  }
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/blockly@10/blockly.min.js';
  script.onload = function() { initBlockly(); };
  script.onerror = function() {
    document.getElementById('te-workspace').innerHTML = '<p style="color:red;padding:20px;">Erreur chargement Blockly. Vรฉrifiez votre connexion internet.</p>';
  };
  document.head.appendChild(script);

/* Data-URI d'un petit triangle โพ blanc (visible sur header vert/orange).
   Sert d'icรดne de repli cliquable en tรชte des blocs station / sous-cat. */
var FOLD_ICON_SRC = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14"><path d="M3 5l4 4 4-4z" fill="white"/></svg>'
);

/* Types de blocs sur lesquels on ajoute le triangle de repli + dรฉpli au clic */
var TYPES_REPLIABLES = ['taxo_station', 'taxo_subcat'];

function initBlockly() {
  /* 1. Enregistrer les blocs custom.
     Pour les blocs station / sous-cat : aprรจs le jsonInit, on insรจre en tรชte
     un FieldImage cliquable (โพ) qui replie le bloc (setCollapsed(true)).
     Le champ est nommรฉ FOLD_ICON et n'est JAMAIS lu par l'extraction
     (qui lit uniquement LABEL / ACTION_TYPE / NOTE / ETATS). */
  blockDefs.forEach(function(def) {
    var repliable = TYPES_REPLIABLES.indexOf(def.type) !== -1;
    Blockly.Blocks[def.type] = {
      init: function() {
        this.jsonInit(def);
        if (repliable) {
          var self = this;
          var icon = new Blockly.FieldImage(
            FOLD_ICON_SRC, 14, 14, 'โพ plier',
            function() { self.setCollapsed(true); }
          );
          /* Insรฉrer le triangle au tout dรฉbut du premier input (celui du LABEL) */
          this.inputList[0].insertFieldAt(0, icon, 'FOLD_ICON');
        }
      }
    };
  });

  /* 2. Injecter le workspace dans #te-workspace */
  var theme = (Blockly.Themes && Blockly.Themes.Zelos)
    ? Blockly.Themes.Zelos
    : (Blockly.Themes && Blockly.Themes.Classic ? Blockly.Themes.Classic : undefined);

  var workspaceConfig = {
    toolbox: toolbox,
    scrollbars: true,
    trashcan: true,
    collapse: true,
    move: { scrollbars: true, drag: true, wheel: true },
    zoom: { controls: true, wheel: true, startScale: 0.9 }
  };
  if (theme) workspaceConfig.theme = theme;

  workspace = Blockly.inject('te-workspace', workspaceConfig);

  /* 3. Construire les onglets et afficher la premiรจre machine */
  renderTabs();
  switchMachine(machineKeys()[0]);

  /* 4. รcouter les changements pour sauvegarder (machine active uniquement) */
  workspace.addChangeListener(function(event) {
    if (chargementEnCours || event.isUiEvent) return;
    if (!activeMachineKey) return;
    taxo[activeMachineKey].stations = extraireStationsDepuisWorkspace(workspace);
    sauvegarder();
  });

  /* 4 bis. Dรฉplier au clic sur un bloc DรJร repliรฉ (station / sous-cat).
     Quand un bloc est repliรฉ, Blockly masque ses champs (donc le triangle โพ) :
     un clic n'importe oรน sur le bloc compact le dรฉplie alors (setCollapsed(false)).
     Ce listener n'agit que sur les blocs repliรฉs โ aucun conflit avec l'รฉdition
     d'un libellรฉ (bloc dรฉpliรฉ) ni avec le clic sur le triangle (clic de champ, et
     le bloc n'est pas encore repliรฉ ร  cet instant). Purement visuel : setCollapsed
     รฉmet un รฉvรจnement UI ignorรฉ par le listener de sauvegarde ci-dessus. */
  workspace.addChangeListener(function(e) {
    if (e.type === Blockly.Events.CLICK && e.targetType === 'block' && e.blockId) {
      var b = workspace.getBlockById(e.blockId);
      if (b && b.isCollapsed() && TYPES_REPLIABLES.indexOf(b.type) !== -1) {
        b.setCollapsed(false);
      }
    }
  });

  /* 5. Bouton Reset : rรฉinitialiser le workspace */
  document.getElementById('te-reset').addEventListener('click', function() {
    if (confirm('Rรฉinitialiser vers la taxonomie par dรฉfaut ? (les modifications non poussรฉes seront perdues)')) {
      taxo = clone(TAXO_DEFAUT);
      sauvegarder();
      activeMachineKey = null;
      renderTabs();
      switchMachine(machineKeys()[0]);
      showToast('Taxonomie rรฉinitialisรฉe', 'info');
    }
  });

  return workspace;
}

/* Translittรฉration basique + slug unique contre les clรฉs existantes */
function slugifyKey(label) {
  var base = String(label).toLowerCase()
    .replace(/[ร รขรค]/g, 'a')
    .replace(/[รฉรจรชรซ]/g, 'e')
    .replace(/[รฎรฏ]/g, 'i')
    .replace(/[รดรถ]/g, 'o')
    .replace(/[รนรปรผ]/g, 'u')
    .replace(/[รง]/g, 'c')
    .replace(/\s+/g, '_')
    .replace(/[^a-z0-9_]/g, '');
  if (!base) { base = 'machine'; }

  var existantes = Object.keys(taxo).filter(function(k) { return !estCleReservee(k); });
  if (existantes.indexOf(base) === -1) { return base; }
  var n = 2;
  while (existantes.indexOf(base + '_' + n) !== -1) { n++; }
  return base + '_' + n;
}

/* Reconstruit la barre d'onglets depuis machineKeys() */
function renderTabs() {
  var tabsEl = document.getElementById('te-tabs');
  if (!tabsEl) { return; }
  tabsEl.innerHTML = '';

  machineKeys().forEach(function(key) {
    var tab = document.createElement('button');
    tab.type = 'button';
    tab.className = 'te-tab' + (key === activeMachineKey ? ' active' : '');

    var lbl = document.createElement('span');
    lbl.textContent = taxo[key].label || key;
    lbl.addEventListener('click', function() { switchMachine(key); });

    var btnRename = document.createElement('button');
    btnRename.type = 'button';
    btnRename.className = 'te-tab-rename';
    btnRename.textContent = 'โ';
    btnRename.title = 'Renommer';
    btnRename.addEventListener('click', function(e) {
      e.stopPropagation();
      renommerMachine(key);
    });

    var btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.className = 'te-tab-del';
    btnDel.textContent = 'โ';
    btnDel.title = 'Supprimer';
    btnDel.addEventListener('click', function(e) {
      e.stopPropagation();
      supprimerMachine(key);
    });

    tab.appendChild(lbl);
    tab.appendChild(btnRename);
    tab.appendChild(btnDel);
    tabsEl.appendChild(tab);
  });

  var btnAdd = document.createElement('button');
  btnAdd.type = 'button';
  btnAdd.className = 'te-tab-add';
  btnAdd.textContent = '+ Machine';
  btnAdd.addEventListener('click', function() { ajouterMachine(); });
  tabsEl.appendChild(btnAdd);
}

/* Bascule sur la machine `key` : sauve la prรฉcรฉdente, charge la nouvelle */
function switchMachine(key) {
  if (!key) { return; }

  /* 1. Sauvegarder la machine active courante */
  if (activeMachineKey && !chargementEnCours && taxo[activeMachineKey]) {
    taxo[activeMachineKey].stations = extraireStationsDepuisWorkspace(workspace);
    sauvegarder();
  }

  /* 2. Nouvelle machine active */
  activeMachineKey = key;

  /* 3. Recharger le workspace pour cette machine uniquement */
  chargementEnCours = true;
  workspace.clear();
  chargerMachineEnBlocs(workspace, key);
  chargementEnCours = false;

  /* 4. Rafraรฎchir les onglets */
  renderTabs();
}

/* Ajoute une machine et bascule dessus */
function ajouterMachine() {
  var nom = prompt('Nom de la nouvelle machine :');
  if (!nom || !nom.trim()) { return; }
  var key = slugifyKey(nom.trim());
  taxo[key] = { label: nom.trim(), stations: [] };
  sauvegarder();
  switchMachine(key);
}

/* Renomme une machine (le label uniquement โ la clรฉ reste stable) */
function renommerMachine(key) {
  var nv = prompt('Nouveau nom :', taxo[key].label);
  if (nv && nv.trim()) {
    taxo[key].label = nv.trim();
    sauvegarder();
    renderTabs();
  }
}

/* Supprime une machine (jamais la derniรจre) */
function supprimerMachine(key) {
  if (machineKeys().length <= 1) {
    showToast('Impossible de supprimer la derniรจre machine', 'error');
    return;
  }
  if (confirm('Supprimer la machine "' + taxo[key].label + '" ?')) {
    delete taxo[key];
    sauvegarder();
    var reste = machineKeys();
    activeMachineKey = null;
    switchMachine(reste[0]);
  }
}

/* =====================================================
   BLOCKLY โ CHARGEMENT D'UNE MACHINE (stations top-level)
   ===================================================== */
function chargerMachineEnBlocs(ws, key) {
  var machine = taxo[key];
  if (!machine) { return; }

  var prevStationBlock = null;

  machine.stations.forEach(function(station) {
    var sBlock = ws.newBlock('taxo_station');
    sBlock.setFieldValue(station.label, 'LABEL');
    sBlock.initSvg();
    sBlock.render();

    if (!prevStationBlock) {
      /* Premiรจre station : top-block positionnรฉ dans la vue */
      sBlock.moveBy(20, 20);
    } else {
      var prevConn = prevStationBlock.nextConnection;
      if (prevConn && sBlock.previousConnection) prevConn.connect(sBlock.previousConnection);
    }

    /* Subcats */
    var prevSubcatBlock = null;
    (station.subcats || []).forEach(function(subcat) {
      var scBlock = ws.newBlock('taxo_subcat');
      scBlock.setFieldValue(subcat.label, 'LABEL');
      scBlock.initSvg();
      scBlock.render();

      if (!prevSubcatBlock) {
        var stmtConn = sBlock.getInput('SUBCATS').connection;
        if (stmtConn && scBlock.previousConnection) stmtConn.connect(scBlock.previousConnection);
      } else {
        var prevConnSc = prevSubcatBlock.nextConnection;
        if (prevConnSc && scBlock.previousConnection) prevConnSc.connect(scBlock.previousConnection);
      }

      /* รlรฉments */
      var prevElemBlock = null;
      (subcat.elements || []).forEach(function(elem) {
        var eBlock = ws.newBlock('taxo_element');
        eBlock.setFieldValue(elem.label || '', 'LABEL');
        eBlock.initSvg();
        eBlock.render();

        if (!prevElemBlock) {
          var stmtConnE = scBlock.getInput('ELEMENTS').connection;
          if (stmtConnE && eBlock.previousConnection) stmtConnE.connect(eBlock.previousConnection);
        } else {
          var prevConnE = prevElemBlock.nextConnection;
          if (prevConnE && eBlock.previousConnection) prevConnE.connect(eBlock.previousConnection);
        }

        /* Blocs action (actions = objets {type, note?, etats?}) */
        var prevActionBlock = null;
        (elem.actions || []).forEach(function(action) {
          var actionType = (typeof action === 'string') ? action : (action.type || 'controle');
          var actionNote = (typeof action === 'object' && typeof action.note === 'string') ? action.note : '';
          /* etats = chaรฎne brute slash-sรฉparรฉe ; compat tableau ancien format */
          var actionEtats = '';
          if (typeof action === 'object') {
            if (typeof action.etats === 'string') {
              actionEtats = action.etats;
            } else if (Array.isArray(action.etats)) {
              actionEtats = action.etats.map(function(x) { return String(x).trim(); })
                                        .filter(function(x) { return x; }).join('/');
            }
          }
          var aBlock = ws.newBlock('taxo_action');
          aBlock.setFieldValue(actionType, 'ACTION_TYPE');
          if (actionNote) { aBlock.setFieldValue(actionNote, 'NOTE'); }
          if (actionEtats) { aBlock.setFieldValue(actionEtats, 'ETATS'); }
          aBlock.initSvg();
          aBlock.render();

          if (!prevActionBlock) {
            var actionsConn = eBlock.getInput('ACTIONS').connection;
            if (actionsConn && aBlock.previousConnection) actionsConn.connect(aBlock.previousConnection);
          } else {
            if (prevActionBlock.nextConnection && aBlock.previousConnection)
              prevActionBlock.nextConnection.connect(aBlock.previousConnection);
          }

          prevActionBlock = aBlock;
        });

        prevElemBlock = eBlock;
      });

      prevSubcatBlock = scBlock;
    });

    prevStationBlock = sBlock;
  });

  ws.scrollCenter();
}

/* =====================================================
   BLOCKLY โ EXTRACTION DES STATIONS DEPUIS LE WORKSPACE
   ===================================================== */
function extraireStationsDepuisWorkspace(ws) {
  var stations = [];
  var topBlocks = ws.getTopBlocks(true);

  topBlocks.forEach(function(block) {
    if (block.type !== 'taxo_station') return;

    var stationBlock = block;
    while (stationBlock) {
      if (stationBlock.type === 'taxo_station') {
        var subcats = [];
        var subcatsInput = stationBlock.getInput('SUBCATS');
        if (subcatsInput && subcatsInput.connection && subcatsInput.connection.targetBlock()) {
          var subcatBlock = subcatsInput.connection.targetBlock();
          while (subcatBlock) {
            if (subcatBlock.type === 'taxo_subcat') {
              var elements = [];
              var elemsInput = subcatBlock.getInput('ELEMENTS');
              if (elemsInput && elemsInput.connection && elemsInput.connection.targetBlock()) {
                var elemBlock = elemsInput.connection.targetBlock();
                while (elemBlock) {
                  if (elemBlock.type === 'taxo_element') {
                    var actions = [];
                    var actionsInput = elemBlock.getInput('ACTIONS');
                    if (actionsInput && actionsInput.connection && actionsInput.connection.targetBlock()) {
                      var actionBlock = actionsInput.connection.targetBlock();
                      while (actionBlock) {
                        if (actionBlock.type === 'taxo_action') {
                          var actionObj = { type: actionBlock.getFieldValue('ACTION_TYPE') };
                          /* Note libre (champ NOTE) : incluse seulement si non vide */
                          var note = (actionBlock.getFieldValue('NOTE') || '').trim();
                          if (note) { actionObj.note = note; }
                          /* รtats : chaรฎne brute slash-sรฉparรฉe (champ ETATS), incluse si non vide */
                          var etatsStr = (actionBlock.getFieldValue('ETATS') || '').trim();
                          if (etatsStr) { actionObj.etats = etatsStr; }
                          actions.push(actionObj);
                        }
                        actionBlock = actionBlock.nextConnection && actionBlock.nextConnection.targetBlock();
                      }
                    }
                    elements.push({ label: elemBlock.getFieldValue('LABEL') || '', actions: actions });
                  }
                  elemBlock = elemBlock.nextConnection && elemBlock.nextConnection.targetBlock();
                }
              }
              subcats.push({ label: subcatBlock.getFieldValue('LABEL') || '', elements: elements });
            }
            subcatBlock = subcatBlock.nextConnection && subcatBlock.nextConnection.targetBlock();
          }
        }
        stations.push({ label: stationBlock.getFieldValue('LABEL') || '', subcats: subcats });
      }
      stationBlock = stationBlock.nextConnection && stationBlock.nextConnection.targetBlock();
    }
  });

  return stations;
}

/* =====================================================
   INIT
   ===================================================== */
charger();
chargerConfig();
chargerBlocklyEtInit();

/* Recalcule le top des panneaux latรฉraux quand la fenรชtre change de taille */
window.addEventListener('resize', positionnerSidebars);

})();
</script>
