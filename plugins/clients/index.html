<!--
  Plugin : Clients (référentiel)
  Phase A — CRUD complet + recherche fuzzy (Fuse.js) + détection de doublons.

  Données : 100 % via window.ClientsDB (IndexedDB, offline-first). La synchro
  Supabase est assurée automatiquement par window.SyncManager après chaque
  mutation locale — ce plugin n'appelle JAMAIS la synchro ni Supabase.

  Modèle client : { id, nom, adresse, contact, email, code_client,
                    machines:[{type,numero,annee?}], updated_at, deleted }

  Le plugin écoute l'événement window `clients-db-changed` pour se rafraîchir
  automatiquement (mutation locale ou pull de synchro).
-->

<style>
  /* ============================================================
     Styles du plugin Clients — préfixe "cli-"
     Charte Multivac via les variables CSS de main.css
     ============================================================ */

  /* ---- Barre d'actions (recherche + ajout) ---- */
  .cli-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .cli-search-wrap {
    position: relative;
    flex: 1 1 220px;
    min-width: 0;
  }
  .cli-search-wrap .cli-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-muted);
    pointer-events: none;
  }
  .cli-search-input {
    padding-left: 38px;
  }
  /* Bouton croix pour vider la recherche */
  .cli-search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    -webkit-tap-highlight-color: transparent;
  }
  .cli-search-clear:hover { background: var(--color-bg); }
  .cli-search-clear.cli-visible { display: flex; }

  .cli-btn-add { flex-shrink: 0; }

  /* ---- Compteur / sous-titre ---- */
  .cli-count {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    margin-bottom: 12px;
  }

  /* ---- Liste des clients ---- */
  .cli-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    list-style: none;
  }

  .cli-item {
    background-color: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .cli-item:hover {
    border-color: var(--color-primary);
    box-shadow: var(--shadow-md);
  }

  .cli-item-main {
    flex: 1;
    min-width: 0; /* autorise l'ellipsis */
    cursor: pointer;
  }
  .cli-item-nom {
    font-weight: 600;
    color: var(--color-primary);
    font-size: var(--font-size-base);
    word-break: break-word;
  }
  .cli-item-sub {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    margin-top: 2px;
    word-break: break-word;
  }
  /* Code client (sous le nom) — badge discret monospace */
  .cli-item-code {
    display: inline-block;
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    background-color: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    padding: 1px 8px;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
    word-break: break-word;
  }
  /* Puces "machines" */
  .cli-machines {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .cli-machine-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background-color: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 14px;
    padding: 2px 10px;
    font-size: var(--font-size-xs);
    color: var(--color-text);
  }

  /* Actions de la carte (éditer / supprimer) */
  .cli-item-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .cli-icon-btn {
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    background-color: var(--color-surface);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: background-color var(--transition), color var(--transition), border-color var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .cli-icon-btn:hover {
    background-color: var(--color-bg);
    color: var(--color-primary);
    border-color: var(--color-primary);
  }
  .cli-icon-btn.cli-danger:hover {
    color: #E53E3E;
    border-color: #E53E3E;
  }

  /* ---- État vide ---- */
  .cli-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--color-text-muted);
  }
  .cli-empty svg { color: var(--color-border); margin-bottom: 12px; }
  .cli-empty-title { font-weight: 600; color: var(--color-text); margin-bottom: 4px; }
  .cli-empty-msg { font-size: var(--font-size-sm); }

  /* ============================================================
     MODALE Formulaire (ajout / édition)
     100dvh + safe-areas pour iPhone SE / notch
     ============================================================ */
  .cli-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 9000;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .cli-modal-overlay.cli-open { display: flex; }

  .cli-modal {
    background: var(--color-surface);
    width: 100%;
    max-width: 540px;
    max-height: 92dvh;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.3);
    /* Safe-area iOS (bas) */
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (min-width: 768px) {
    .cli-modal-overlay { align-items: center; }
    .cli-modal {
      border-radius: var(--radius-lg);
      max-height: 88dvh;
    }
  }

  .cli-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
  }
  .cli-modal-title {
    font-size: var(--font-size-lg);
    font-weight: 600;
    color: var(--color-primary);
  }
  .cli-modal-close {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .cli-modal-close:hover { background: var(--color-bg); color: var(--color-text); }

  /* Corps scrollable — garantit qu'aucun contenu n'est coupé sur petit écran */
  .cli-modal-body {
    padding: 18px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
  }

  .cli-modal-footer {
    display: flex;
    gap: 10px;
    padding: 14px 18px;
    border-top: 1px solid var(--color-border);
    flex-shrink: 0;
  }
  .cli-modal-footer .btn { flex: 1; }

  /* ---- Liste dynamique de machines (dans le formulaire) ----
     Layout en CSS Grid, robuste sur toutes les largeurs.

     • Petit écran (iPhone SE, < 480px) : 2 colonnes.
         ┌──────── Type ────────┬──── N° de série ────┐
         ├──── Année ───────────┴──── [bouton — ] ────┤
       Type et Numéro occupent chacun une colonne sur la 1re ligne ; Année et le
       bouton retirer (largeur fixe) sont alignés sur la 2e ligne. Rien n'est
       écrasé ni coupé.

     • iPad / PC (≥ 480px) : tout sur une seule ligne.
         [ Type ][ N° de série ][ Année ][ — ]
       Les trois champs partagent l'espace via minmax() (l'Année garde une
       largeur lisible et n'est jamais compressée à zéro), le bouton retirer
       occupe une colonne fixe alignée en bout de ligne. */
  .cli-machines-editor { margin-top: 4px; }
  .cli-machine-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    grid-auto-rows: auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--color-border);
  }
  .cli-machine-row:last-child { border-bottom: none; padding-bottom: 0; }
  .cli-machine-row .form-control { margin: 0; min-width: 0; width: 100%; }

  /* Petit écran : Type + Numéro en haut, Année + bouton en bas. */
  .cli-machine-row .cli-m-type   { grid-column: 1 / 2; }
  .cli-machine-row .cli-m-numero { grid-column: 2 / 3; }
  .cli-machine-row .cli-m-annee  { grid-column: 1 / 2; }
  .cli-machine-remove            { grid-column: 2 / 3; justify-self: end; }

  /* iPad / PC : tout sur une seule ligne, Année jamais écrasée. */
  @media (min-width: 480px) {
    .cli-machine-row {
      grid-template-columns:
        minmax(0, 1.4fr)   /* Type   */
        minmax(0, 1.4fr)   /* Numéro */
        minmax(96px, 1fr)  /* Année — plancher lisible, jamais à zéro */
        44px;              /* Bouton retirer */
    }
    .cli-machine-row .cli-m-type   { grid-column: 1 / 2; }
    .cli-machine-row .cli-m-numero { grid-column: 2 / 3; }
    .cli-machine-row .cli-m-annee  { grid-column: 3 / 4; }
    .cli-machine-remove            { grid-column: 4 / 5; }
  }

  .cli-machine-remove {
    width: 44px;
    height: 44px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    background: var(--color-surface);
    color: var(--color-text-muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .cli-machine-remove:hover { color: #E53E3E; border-color: #E53E3E; }
  .cli-machines-empty {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    font-style: italic;
    margin-bottom: 8px;
  }

  /* ---- Bandeau "doublon possible" (non bloquant) ---- */
  .cli-dup {
    display: none;
    align-items: flex-start;
    gap: 10px;
    background-color: #FEF8EC;
    border: 1px solid #F5D98B;
    color: #7A5A00;
    border-radius: var(--radius);
    padding: 12px;
    margin-top: 10px;
    font-size: var(--font-size-sm);
  }
  .cli-dup.cli-visible { display: flex; }
  .cli-dup-icon { flex-shrink: 0; margin-top: 1px; }
  .cli-dup-body { flex: 1; min-width: 0; }
  .cli-dup-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .cli-dup-actions button {
    font-family: var(--font-family);
    font-size: var(--font-size-sm);
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid transparent;
    min-height: 36px;
    -webkit-tap-highlight-color: transparent;
  }
  .cli-dup-open {
    background-color: var(--color-primary);
    color: var(--color-white);
    border-color: var(--color-primary);
  }
  .cli-dup-open:hover { background-color: var(--color-primary-dark); }
  .cli-dup-ignore {
    background-color: transparent;
    color: #7A5A00;
    border-color: #E6C36B;
  }
  .cli-dup-ignore:hover { background-color: rgba(245, 217, 139, 0.35); }

  /* Champ requis manquant */
  .form-control.cli-invalid {
    border-color: #E53E3E;
    box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.15);
  }

  /* ---- Confirmation de suppression ---- */
  .cli-confirm-box {
    width: 300px;
    max-width: calc(100vw - 32px);
    background: var(--color-surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }
  .cli-confirm-box h3 {
    font-size: var(--font-size-lg);
    color: var(--color-primary);
    margin-bottom: 8px;
  }
  .cli-confirm-box p {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    margin-bottom: 20px;
    word-break: break-word;
  }
  .cli-confirm-actions { display: flex; gap: 10px; }
  .cli-confirm-actions .btn { flex: 1; }
  .cli-btn-danger {
    background-color: #E53E3E;
    color: var(--color-white);
    border-color: #E53E3E;
  }
  .cli-btn-danger:hover {
    background-color: #C53030;
    border-color: #C53030;
    color: var(--color-white);
  }

  /* La confirmation est centrée même sur mobile */
  #cli-confirm-overlay { align-items: center; }
  #cli-confirm-overlay .cli-modal { background: transparent; box-shadow: none; }
</style>

  </div>
  <div class="card-body">

<!-- ============================================================
     LISTE + RECHERCHE
     ============================================================ -->
<div class="card">
  <div class="cli-toolbar">
    <div class="cli-search-wrap">
      <span class="cli-search-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
        </svg>
      </span>
      <!--
        Anti-autofill (Brave/Chrome + gestionnaires de mots de passe) :
        Brave/Chrome ignorent souvent autocomplete="off" et injectent l'email
        de connexion du site dans tout champ qui leur paraît être un identifiant.
        On neutralise cela via :
          - un name NON identifiable (surtout pas email/username/search)
          - autocomplete/autocorrect/autocapitalize="off" + spellcheck="false"
          - data-lpignore / data-1p-ignore / data-form-type=other (LastPass/1Password)
          - readonly retiré au 1er focus (voir JS) pour casser l'autofill au montage
        Objectif : le champ reste vide tant que l'utilisateur ne tape rien.
      -->
      <input class="form-control cli-search-input" id="cli-search" type="search"
             name="cli-filtre-ref" inputmode="search"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false"
             data-lpignore="true" data-1p-ignore data-form-type="other"
             readonly
             placeholder="Rechercher un client, une adresse, une machine…"
             aria-label="Rechercher un client">
      <button class="cli-search-clear" id="cli-search-clear" type="button"
              aria-label="Effacer la recherche" title="Effacer">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <button class="btn btn-primary cli-btn-add" id="cli-btn-add" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/>
      </svg>
      Nouveau
    </button>
  </div>

  <p class="cli-count" id="cli-count" aria-live="polite"></p>

  <ul class="cli-list" id="cli-list" role="list">
    <!-- Items injectés par JS -->
  </ul>
</div>

<!-- ============================================================
     MODALE FORMULAIRE (ajout / édition)

<!-- ============================================================
     LOGIQUE DU PLUGIN
     ============================================================ -->
<script>
(function () {
  'use strict';

  /* ----------------------------------------------------------
     Garde anti-double-exécution : app.js réexécute les <script>
     du plugin à chaque navigation. On nettoie systématiquement les
     écouteurs window posés lors d'un précédent montage avant d'en
     reposer, et on ne garde qu'une instance active.
     ---------------------------------------------------------- */
  if (window.__cliCleanup) {
    try { window.__cliCleanup(); } catch (e) { /* no-op */ }
    window.__cliCleanup = null;
  }

  function el(id) { return document.getElementById(id); }

  /* Sécurité : si le DOM du plugin n'est pas présent (montage partiel), on sort. */
  var listeEl = el('cli-list');
  if (!listeEl) return;

  /* ----------------------------------------------------------
     Références DOM
     ---------------------------------------------------------- */
  var dom = {
    search:        el('cli-search'),
    searchClear:   el('cli-search-clear'),
    btnAdd:        el('cli-btn-add'),
    count:         el('cli-count'),
    list:          listeEl,

    /* Formulaire */
    formOverlay:   el('cli-form-overlay'),
    formTitle:     el('cli-form-title'),
    formClose:     el('cli-form-close'),
    formCancel:    el('cli-form-cancel'),
    formSave:      el('cli-form-save'),
    nom:           el('cli-nom'),
    adresse:       el('cli-adresse'),
    contact:       el('cli-contact'),
    email:         el('cli-email'),
    codeClient:    el('cli-code-client'),
    machinesEditor: el('cli-machines-editor'),
    machinesEmpty: el('cli-machines-empty'),
    machineAdd:    el('cli-machine-add'),

    /* Doublon */
    dup:           el('cli-dup'),
    dupText:       el('cli-dup-text'),
    dupOpen:       el('cli-dup-open'),
    dupIgnore:     el('cli-dup-ignore'),

    /* Confirmation suppression */
    confirmOverlay: el('cli-confirm-overlay'),
    confirmText:    el('cli-confirm-text'),
    confirmCancel:  el('cli-confirm-cancel'),
    confirmOk:      el('cli-confirm-ok'),
  };

  /* ----------------------------------------------------------
     État local
     ---------------------------------------------------------- */
  var clients = [];          /* cache courant (non supprimés), trié par nom */
  var fuse = null;           /* instance Fuse.js (reconstruite à chaque rafraîchissement) */
  var editingId = null;      /* id du client en édition, null = création */
  var dupCandidate = null;   /* client candidat doublon affiché dans le bandeau */
  var dupIgnored = false;    /* l'utilisateur a choisi "continuer la création" */
  var pendingDeleteId = null;/* id en attente de confirmation de suppression */
  var rechercheSaisie = false;/* true uniquement quand l'utilisateur a réellement tapé
                                dans le champ de recherche. Tant que c'est false, on
                                ignore la valeur du champ (qui peut avoir été remplie
                                par l'autofill du navigateur) et on affiche la liste
                                complète. Voir valeurRecherche(). */
  var refreshDiffere = false;/* un clients-db-changed est arrivé pendant qu'une modale
                                était ouverte : on rejoue le rafraîchissement à la
                                fermeture pour ne pas perturber la saisie en cours. */

  /* ----------------------------------------------------------
     Utilitaires
     ---------------------------------------------------------- */

  /* Normalisation pour comparaison : minuscules + suppression des accents. */
  function normaliser(str) {
    return String(str == null ? '' : str)
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '') /* diacritiques combinants */
      .trim();
  }

  /* Échappement HTML : délégation au helper partagé window.MUF.escapeHtml
     (js/utils.js, chargé tôt dans le shell et précaché). On garde un nom
     local par commodité d'appel dans le reste du plugin. */
  function escapeHtml(str) {
    return window.MUF.escapeHtml(str);
  }

  function triParNom(a, b) {
    return normaliser(a.nom).localeCompare(normaliser(b.nom), 'fr');
  }

  /* Construit le sous-titre (adresse / contact / email) d'une carte. */
  function sousTitre(c) {
    var parts = [];
    if (c.adresse) parts.push(c.adresse);
    if (c.contact) parts.push(c.contact);
    if (c.email) parts.push(c.email);
    return parts.join(' • ');
  }

  /* ----------------------------------------------------------
     Recherche fuzzy (Fuse.js)
     - tolère fautes de frappe, accents, casse
     - cherche sur nom + adresse + contact + n° et type de machine
     ---------------------------------------------------------- */
  function construireFuse() {
    if (typeof window.Fuse !== 'function') {
      fuse = null;
      return;
    }
    /* On indexe une version "aplatie" des machines pour que Fuse puisse
       chercher dedans (type + numéro concaténés). */
    var docs = clients.map(function (c) {
      return {
        ref: c,
        nom: c.nom || '',
        adresse: c.adresse || '',
        contact: c.contact || '',
        email: c.email || '',
        code_client: c.code_client || '',
        machines: (c.machines || [])
          .map(function (m) { return [m.type, m.numero, m.annee].filter(Boolean).join(' '); })
          .join(' '),
      };
    });

    fuse = new window.Fuse(docs, {
      includeScore: true,
      ignoreLocation: true,   /* la correspondance peut être n'importe où dans le champ */
      threshold: 0.4,         /* tolérance aux fautes (0 = strict, 1 = tout) */
      minMatchCharLength: 2,
      keys: [
        { name: 'nom', weight: 0.5 },
        { name: 'code_client', weight: 0.2 },
        { name: 'adresse', weight: 0.15 },
        { name: 'contact', weight: 0.05 },
        { name: 'email', weight: 0.05 },
        { name: 'machines', weight: 0.05 },
      ],
      /* Fuse normalise déjà la casse ; on lui passe aussi une fonction de
         normalisation pour neutraliser les accents (recherche "boulangri"). */
      getFn: function (obj, path) {
        var v = window.Fuse.config.getFn(obj, path);
        if (Array.isArray(v)) return v.map(normaliser);
        return normaliser(v);
      },
    });
  }

  /* Valeur de recherche EFFECTIVE, robuste à l'autofill du navigateur.
     - Tant que l'utilisateur n'a pas tapé lui-même (rechercheSaisie === false),
       on renvoie '' : une valeur injectée par l'autofill (ex. l'email de
       connexion) est donc ignorée et la liste complète s'affiche.
     - Une valeur ne contenant que des espaces est traitée comme vide.
     C'est le point d'entrée unique pour lire la recherche dans tout le rendu,
     ce qui rend le comportement identique entre le rendu initial et celui qui
     suit un enregistrement (suppression de l'incohérence du Bug 2). */
  function valeurRecherche() {
    if (!rechercheSaisie || !dom.search) return '';
    return dom.search.value.trim();
  }

  /* Renvoie la liste filtrée selon la recherche courante (ou tout si vide). */
  function clientsFiltres() {
    var q = valeurRecherche();
    if (!q) return clients.slice();

    if (fuse) {
      var terme = normaliser(q);
      return fuse.search(terme).map(function (r) { return r.item.ref; });
    }

    /* Repli si Fuse indisponible : filtre "contient" insensible accents/casse. */
    var n = normaliser(q);
    return clients.filter(function (c) {
      return normaliser(c.nom).indexOf(n) !== -1
          || normaliser(c.adresse).indexOf(n) !== -1
          || normaliser(c.contact).indexOf(n) !== -1
          || normaliser(c.email).indexOf(n) !== -1
          || normaliser(c.code_client).indexOf(n) !== -1;
    });
  }

  /* ----------------------------------------------------------
     Rendu de la liste
     ----------------------------------------------------------
     GARDE GLOBALE anti-plantage : reconstruire la <ul> (innerHTML = '')
     pendant qu'une modale est ouverte n'a aucun intérêt visuel (la liste est
     masquée derrière l'overlay) et peut être ressenti comme une fermeture si
     le rendu est déclenché par un effet de bord (timer, paste, sync). On
     refuse donc tout rendu tant qu'une modale est ouverte, et on note qu'il
     faudra rejouer le rafraîchissement à la fermeture.
     NB : modaleOuverte/refreshDiffere sont définies plus bas mais hoistées
     (fonction) / accessibles (var de closure) au moment de l'appel. */
  function rendreListe() {
    if (modaleOuverte()) {
      refreshDiffere = true; /* rejoué par appliquerRafraichissementDiffere() */
      return;
    }
    var visibles = clientsFiltres();
    var q = valeurRecherche();

    /* Compteur */
    if (clients.length === 0) {
      dom.count.textContent = '';
    } else if (q) {
      dom.count.textContent = visibles.length + ' résultat'
        + (visibles.length > 1 ? 's' : '') + ' sur ' + clients.length;
    } else {
      dom.count.textContent = clients.length + ' client'
        + (clients.length > 1 ? 's' : '');
    }

    /* État vide */
    if (visibles.length === 0) {
      dom.list.innerHTML = '';
      var vide = document.createElement('li');
      vide.className = 'cli-empty';
      if (clients.length === 0) {
        vide.innerHTML =
          '<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3" aria-hidden="true">' +
          '<path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 100-8 4 4 0 000 8z"/></svg>' +
          '<div class="cli-empty-title">Aucun client enregistré</div>' +
          '<div class="cli-empty-msg">Cliquez sur « Nouveau » pour créer votre premier client.</div>';
      } else {
        vide.innerHTML =
          '<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3" aria-hidden="true">' +
          '<path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>' +
          '<div class="cli-empty-title">Aucun résultat</div>' +
          '<div class="cli-empty-msg">Aucun client ne correspond à « ' + escapeHtml(q) + ' ».</div>';
      }
      dom.list.appendChild(vide);
      return;
    }

    /* Construction des cartes via fragment (perf + pas de reflow multiple) */
    var frag = document.createDocumentFragment();
    visibles.forEach(function (c) {
      frag.appendChild(creerCarte(c));
    });
    dom.list.innerHTML = '';
    dom.list.appendChild(frag);
  }

  function creerCarte(c) {
    var li = document.createElement('li');
    li.className = 'cli-item';

    /* Zone principale (clic = édition) */
    var main = document.createElement('div');
    main.className = 'cli-item-main';
    main.setAttribute('role', 'button');
    main.setAttribute('tabindex', '0');
    main.setAttribute('aria-label', 'Modifier ' + (c.nom || 'le client'));

    var html = '<div class="cli-item-nom">' + escapeHtml(c.nom || '(sans nom)') + '</div>';
    if (c.code_client) {
      html += '<div class="cli-item-code">Code : ' + escapeHtml(c.code_client) + '</div>';
    }
    var sub = sousTitre(c);
    if (sub) html += '<div class="cli-item-sub">' + escapeHtml(sub) + '</div>';

    if (Array.isArray(c.machines) && c.machines.length) {
      html += '<div class="cli-machines">';
      c.machines.forEach(function (m) {
        /* Libellé : "Type N° (Année)" — l'année est affichée si renseignée. */
        var label = [m.type, m.numero].filter(Boolean).join(' ');
        if (m.annee) label += (label ? ' ' : '') + '(' + m.annee + ')';
        if (!label) return;
        html += '<span class="cli-machine-tag">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">' +
          '<path stroke-linecap="round" stroke-linejoin="round" d="M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>' +
          escapeHtml(label) + '</span>';
      });
      html += '</div>';
    }
    main.innerHTML = html;
    main.addEventListener('click', function () { ouvrirFormulaire(c); });
    main.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); ouvrirFormulaire(c); }
    });

    /* Actions */
    var actions = document.createElement('div');
    actions.className = 'cli-item-actions';

    var btnEdit = document.createElement('button');
    btnEdit.type = 'button';
    btnEdit.className = 'cli-icon-btn';
    btnEdit.title = 'Modifier';
    btnEdit.setAttribute('aria-label', 'Modifier ' + (c.nom || 'le client'));
    btnEdit.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>';
    btnEdit.addEventListener('click', function () { ouvrirFormulaire(c); });

    var btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.className = 'cli-icon-btn cli-danger';
    btnDel.title = 'Supprimer';
    btnDel.setAttribute('aria-label', 'Supprimer ' + (c.nom || 'le client'));
    btnDel.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>';
    btnDel.addEventListener('click', function () { demanderSuppression(c); });

    actions.appendChild(btnEdit);
    actions.appendChild(btnDel);

    li.appendChild(main);
    li.appendChild(actions);
    return li;
  }

  /* ----------------------------------------------------------
     Chargement / rafraîchissement depuis ClientsDB
     ---------------------------------------------------------- */
  function rafraichir() {
    return window.ClientsDB.getAll().then(function (liste) {
      clients = (liste || []).slice().sort(triParNom);
      construireFuse();
      rendreListe();
    }).catch(function (err) {
      console.error('[Clients] Lecture impossible :', err);
    });
  }

  /* ----------------------------------------------------------
     Éditeur de machines (liste dynamique)
     ---------------------------------------------------------- */
  function majMachinesEmpty() {
    var vide = dom.machinesEditor.children.length === 0;
    dom.machinesEmpty.style.display = vide ? 'block' : 'none';
  }

  function ajouterLigneMachine(type, numero, annee, machineOriginale) {
    var row = document.createElement('div');
    row.className = 'cli-machine-row';

    /* H1 : on conserve la machine d'origine (avec ses sous-champs non éditables
       par le formulaire, notamment pns: string[] alimenté par l'auto-apprentissage
       et retour-garantie). lireMachines() la fusionnera pour ne rien effacer.
       Pour une nouvelle ligne saisie à la main, machineOriginale est undefined. */
    row._machineOriginale = machineOriginale || null;

    var inType = document.createElement('input');
    inType.type = 'text';
    inType.className = 'form-control cli-m-type';
    inType.placeholder = 'Type (ex. R230)';
    inType.autocomplete = 'off';
    inType.value = type || '';

    var inNum = document.createElement('input');
    inNum.type = 'text';
    inNum.className = 'form-control cli-m-numero';
    inNum.placeholder = 'N° de série';
    inNum.autocomplete = 'off';
    inNum.value = numero || '';

    /* Année (optionnelle, "si connue") — saisie numérique 4 chiffres. */
    var inAnnee = document.createElement('input');
    inAnnee.type = 'text';
    inAnnee.className = 'form-control cli-m-annee';
    inAnnee.placeholder = 'Année';
    inAnnee.autocomplete = 'off';
    inAnnee.inputMode = 'numeric';
    inAnnee.maxLength = 4;
    inAnnee.value = annee || '';

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cli-machine-remove';
    btn.title = 'Retirer cette machine';
    btn.setAttribute('aria-label', 'Retirer cette machine');
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4"/></svg>';
    btn.addEventListener('click', function () {
      row.remove();
      majMachinesEmpty();
    });

    row.appendChild(inType);
    row.appendChild(inNum);
    row.appendChild(inAnnee);
    row.appendChild(btn);
    dom.machinesEditor.appendChild(row);
    majMachinesEmpty();
    return inType;
  }

  function lireMachines() {
    var out = [];
    dom.machinesEditor.querySelectorAll('.cli-machine-row').forEach(function (row) {
      var type = row.querySelector('.cli-m-type').value.trim();
      var numero = row.querySelector('.cli-m-numero').value.trim();
      var annee = row.querySelector('.cli-m-annee').value.trim();
      /* On ignore les lignes totalement vides (aucun des trois champs rempli). */
      if (type || numero || annee) {
        /* H1 : on repart de la machine d'origine pour préserver ses sous-champs
           non éditables ici (pns: string[] et tout futur champ inconnu du
           formulaire), puis on applique les seuls champs éditables. */
        var m = Object.assign({}, row._machineOriginale || {}, {
          type: type,
          numero: numero,
        });
        /* annee : ajoutée si renseignée, retirée sinon, pour ne pas polluer le
           JSONB ni conserver une année obsolète héritée de l'original. */
        if (annee) {
          m.annee = annee;
        } else {
          delete m.annee;
        }
        out.push(m);
      }
    });
    return out;
  }

  /* ----------------------------------------------------------
     Détection de doublon (création uniquement)
     Score fuzzy élevé sur le nom => suggestion non bloquante.
     ---------------------------------------------------------- */
  function masquerDoublon() {
    dom.dup.classList.remove('cli-visible');
    dupCandidate = null;
  }

  function verifierDoublon() {
    /* Jamais en édition, ni si l'utilisateur a déjà choisi de continuer. */
    if (editingId || dupIgnored) { masquerDoublon(); return; }

    var saisie = normaliser(dom.nom.value);
    if (saisie.length < 3) { masquerDoublon(); return; }

    var meilleur = null;
    var meilleurScore = 1; /* plus c'est petit, mieux c'est (0 = identique) */

    if (fuse) {
      /* Recherche restreinte au nom pour la détection de doublon. */
      var res = fuse.search({ nom: saisie });
      if (res.length) {
        meilleur = res[0].item.ref;
        meilleurScore = res[0].score == null ? 0 : res[0].score;
      }
    } else {
      /* Repli : égalité normalisée stricte. */
      clients.some(function (c) {
        if (normaliser(c.nom) === saisie) { meilleur = c; meilleurScore = 0; return true; }
        return false;
      });
    }

    /* Seuil strict : on ne suggère que des correspondances très proches
       (score <= 0.34) pour éviter le bruit. */
    if (meilleur && meilleurScore <= 0.34) {
      dupCandidate = meilleur;
      dom.dupText.innerHTML = 'Un client similaire existe déjà : <strong>'
        + escapeHtml(meilleur.nom) + '</strong>.';
      dom.dup.classList.add('cli-visible');
    } else {
      masquerDoublon();
    }
  }

  /* ----------------------------------------------------------
     Modales : une modale (formulaire OU confirmation de suppression)
     est-elle actuellement ouverte ?
     Sert à différer tout rafraîchissement déclenché par une synchro
     en arrière-plan tant que l'utilisateur saisit dans une modale.
     ---------------------------------------------------------- */
  function modaleOuverte() {
    return dom.formOverlay.classList.contains('cli-open')
        || dom.confirmOverlay.classList.contains('cli-open');
  }

  /* Rejoue, si nécessaire, un rafraîchissement mis en attente pendant
     qu'une modale était ouverte. À appeler à chaque fermeture de modale. */
  function appliquerRafraichissementDiffere() {
    if (refreshDiffere && !modaleOuverte()) {
      refreshDiffere = false;
      rafraichir();
    }
  }

  /* ----------------------------------------------------------
     Ouverture / fermeture de la modale formulaire
     ---------------------------------------------------------- */
  function reinitFormulaire() {
    editingId = null;
    dupIgnored = false;
    dom.nom.value = '';
    dom.adresse.value = '';
    dom.contact.value = '';
    dom.email.value = '';
    dom.codeClient.value = '';
    dom.machinesEditor.innerHTML = '';
    majMachinesEmpty();
    masquerDoublon();
    dom.nom.classList.remove('cli-invalid');
  }

  function ouvrirFormulaire(client) {
    reinitFormulaire();

    if (client) {
      editingId = client.id;
      dom.formTitle.textContent = 'Modifier le client';
      dom.nom.value = client.nom || '';
      dom.adresse.value = client.adresse || '';
      dom.contact.value = client.contact || '';
      dom.email.value = client.email || '';
      dom.codeClient.value = client.code_client || '';
      (client.machines || []).forEach(function (m) {
        /* On transmet l'objet machine complet (4ᵉ arg) pour préserver pns &
           autres sous-champs à l'enregistrement — voir H1 dans lireMachines(). */
        ajouterLigneMachine(m.type, m.numero, m.annee, m);
      });
    } else {
      dom.formTitle.textContent = 'Nouveau client';
    }

    /* On annule tout passage de nettoyage anti-autofill encore en attente : il
       ne doit pas se déclencher pendant la saisie/le collage dans la modale. */
    annulerTimersAutofill();

    dom.formOverlay.classList.add('cli-open');
    /* Focus sur le nom (léger délai pour l'ouverture). */
    setTimeout(function () { try { dom.nom.focus(); } catch (e) {} }, 60);
  }

  function fermerFormulaire() {
    dom.formOverlay.classList.remove('cli-open');
    /* Une synchro a pu modifier la base pendant la saisie : on rejoue
       maintenant le rafraîchissement qui avait été différé. */
    appliquerRafraichissementDiffere();
    /* On reprogramme le nettoyage anti-autofill (annulé à l'ouverture). */
    reprogrammerNettoyageAutofill();
  }

  /* ----------------------------------------------------------
     Enregistrement (création ou édition)
     ---------------------------------------------------------- */
  function enregistrer() {
    var nom = dom.nom.value.trim();
    if (!nom) {
      dom.nom.classList.add('cli-invalid');
      dom.nom.focus();
      return;
    }
    dom.nom.classList.remove('cli-invalid');

    var donnees = {
      nom: nom,
      adresse: dom.adresse.value.trim() || null,
      contact: dom.contact.value.trim() || null,
      email: dom.email.value.trim() || null,
      code_client: dom.codeClient.value.trim() || null,
      machines: lireMachines(),
    };

    dom.formSave.disabled = true;

    var op;
    if (editingId) {
      /* Édition : on récupère l'enregistrement existant pour conserver
         les champs non éditables (created_at, etc.) puis put(). */
      op = window.ClientsDB.get(editingId).then(function (existant) {
        /* H4 : un pull SyncManager a pu appliquer un soft-delete distant pendant
           que la modale était ouverte → get() renvoie null. On ne ressuscite PAS
           le client (sinon il serait re-poussé _dirty vers Supabase, annulant la
           suppression faite sur un autre appareil) : on annule la sauvegarde. */
        if (!existant) {
          dom.formSave.disabled = false;
          fermerFormulaire();
          alert('Client introuvable ou supprime depuis un autre appareil.');
          return null;
        }
        var fusion = Object.assign({}, existant, donnees, { id: editingId });
        return window.ClientsDB.put(fusion);
      });
    } else {
      op = window.ClientsDB.add(donnees);
    }

    op.then(function () {
      dom.formSave.disabled = false;
      /* Le rafraîchissement explicite ci-dessous remplace tout rafraîchissement
         qui aurait été différé pendant la saisie : on consomme le drapeau pour
         éviter un double rendu à la fermeture de la modale. */
      refreshDiffere = false;
      fermerFormulaire();
      /* La liste se rafraîchit aussi via l'event clients-db-changed, mais on
         rafraîchit immédiatement pour un retour visuel instantané. */
      return rafraichir();
    }).catch(function (err) {
      dom.formSave.disabled = false;
      console.error('[Clients] Enregistrement impossible :', err);
      alert('Impossible d\'enregistrer le client. Veuillez réessayer.');
    });
  }

  /* ----------------------------------------------------------
     Suppression (soft-delete via ClientsDB.remove)
     ---------------------------------------------------------- */
  function demanderSuppression(client) {
    pendingDeleteId = client.id;
    dom.confirmText.textContent = 'Le client « ' + (client.nom || 'sans nom')
      + ' » sera retiré de la liste.';
    /* Même garde que pour le formulaire : pas de nettoyage différé pendant
       que la confirmation (une modale) est affichée. */
    annulerTimersAutofill();
    dom.confirmOverlay.classList.add('cli-open');
  }

  function fermerConfirmation() {
    dom.confirmOverlay.classList.remove('cli-open');
    pendingDeleteId = null;
    /* Idem : rejoue un éventuel rafraîchissement différé (sauf si la
       modale formulaire est encore ouverte derrière la confirmation). */
    appliquerRafraichissementDiffere();
    /* Reprogramme le nettoyage anti-autofill seulement si plus aucune modale
       n'est ouverte (le formulaire peut être encore ouvert derrière). */
    if (!modaleOuverte()) reprogrammerNettoyageAutofill();
  }

  function confirmerSuppression() {
    if (!pendingDeleteId) { fermerConfirmation(); return; }
    var id = pendingDeleteId;
    dom.confirmOk.disabled = true;
    window.ClientsDB.remove(id).then(function () {
      dom.confirmOk.disabled = false;
      /* Rafraîchissement explicite ci-dessous : on consomme le drapeau de
         rafraîchissement différé pour éviter un double rendu aux fermetures. */
      refreshDiffere = false;
      fermerConfirmation();
      /* Si on supprimait le client en cours d'édition, on ferme le formulaire. */
      if (editingId === id) fermerFormulaire();
      return rafraichir();
    }).catch(function (err) {
      dom.confirmOk.disabled = false;
      console.error('[Clients] Suppression impossible :', err);
      alert('Impossible de supprimer le client. Veuillez réessayer.');
    });
  }

  /* ----------------------------------------------------------
     Branchement des écouteurs (DOM local — pas de fuite, le DOM
     est remplacé à chaque navigation).
     ---------------------------------------------------------- */
  /* Recherche.
     Anti-autofill : le champ est rendu en readonly (voir HTML) pour empêcher
     Brave/Chrome d'y injecter l'email de connexion au montage. On lève le
     readonly au tout premier focus déclenché par l'utilisateur, ce qui rend le
     champ saisissable sans rouvrir la porte à l'autofill initial. */
  function activerSaisieRecherche() {
    if (dom.search.hasAttribute('readonly')) {
      dom.search.removeAttribute('readonly');
    }
  }
  dom.search.addEventListener('focus', activerSaisieRecherche);
  dom.search.addEventListener('pointerdown', activerSaisieRecherche);

  dom.search.addEventListener('input', function () {
    /* À partir de cette première frappe réelle, la valeur du champ est prise en
       compte par le filtre (avant cela, une éventuelle valeur d'autofill est
       ignorée — voir valeurRecherche). */
    rechercheSaisie = true;
    dom.searchClear.classList.toggle('cli-visible', dom.search.value.length > 0);
    rendreListe();
  });
  dom.searchClear.addEventListener('click', function () {
    dom.search.value = '';
    /* Vider via la croix = retour à l'état "aucune recherche" : on réaffiche la
       liste complète et on neutralise toute valeur résiduelle d'autofill. */
    rechercheSaisie = false;
    dom.searchClear.classList.remove('cli-visible');
    rendreListe();
    dom.search.focus();
  });

  /* Ajout / formulaire */
  dom.btnAdd.addEventListener('click', function () { ouvrirFormulaire(null); });
  dom.formClose.addEventListener('click', fermerFormulaire);
  dom.formCancel.addEventListener('click', fermerFormulaire);
  dom.formSave.addEventListener('click', enregistrer);
  dom.machineAdd.addEventListener('click', function () {
    var input = ajouterLigneMachine('', '', '');
    try { input.focus(); } catch (e) {}
  });

  /* ----------------------------------------------------------
     Collage (copier/coller) robuste dans les champs du formulaire.
     Objectif : un paste ne doit JAMAIS fermer la modale, perdre le focus ni
     casser la mise en page. La garde sur rendreListe() empêche déjà tout
     re-render destructeur ; ici on se contente d'assainir le contenu collé
     dans les champs mono-ligne (sauts de ligne / tabulations → espaces),
     SANS toucher au reste de la modale ni à la liste. On laisse le navigateur
     insérer le texte nativement (respect du curseur / undo), puis on nettoie
     la seule valeur du champ concerné.
     IMPORTANT : on n'appelle pas preventDefault pour préserver le collage natif
     et le comportement d'annulation (Ctrl+Z). */
  function assainirChampMonoLigne(input) {
    if (!input) return;
    input.addEventListener('paste', function () {
      /* Laisse le paste natif se faire, puis normalise la valeur. */
      setTimeout(function () {
        var v = input.value;
        var nettoye = v.replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ');
        if (nettoye !== v) input.value = nettoye;
      }, 0);
    });
  }
  [dom.nom, dom.adresse, dom.contact, dom.email, dom.codeClient].forEach(assainirChampMonoLigne);

  /* Délégation paste pour les champs machines (créés dynamiquement) : un seul
     écouteur sur le conteneur couvre toutes les lignes présentes et futures. */
  dom.machinesEditor.addEventListener('paste', function (e) {
    var cible = e.target;
    if (cible && cible.classList && cible.classList.contains('form-control')) {
      setTimeout(function () {
        var v = cible.value;
        var nettoye = v.replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ');
        if (nettoye !== v) cible.value = nettoye;
      }, 0);
    }
  });

  /* Fermer la modale au clic sur le fond (hors carte).
     On NE ferme que sur un vrai clic isolé sur l'overlay : si un geste de
     sélection de texte (souris) démarre dans un champ et se relâche sur
     l'overlay, le navigateur émet tout de même un 'click' dont la cible est
     l'overlay. On vérifie donc que le pointeur a aussi été pressé sur l'overlay
     (mousedown), ce qui évite une fermeture accidentelle après une sélection /
     un copier-coller à la souris. */
  var pointerDownSurOverlay = false;
  dom.formOverlay.addEventListener('pointerdown', function (e) {
    pointerDownSurOverlay = (e.target === dom.formOverlay);
  });
  dom.formOverlay.addEventListener('click', function (e) {
    if (e.target === dom.formOverlay && pointerDownSurOverlay) fermerFormulaire();
    pointerDownSurOverlay = false;
  });

  /* Détection de doublon pendant la frappe du nom. */
  dom.nom.addEventListener('input', verifierDoublon);
  dom.dupOpen.addEventListener('click', function () {
    if (dupCandidate) ouvrirFormulaire(dupCandidate);
  });
  dom.dupIgnore.addEventListener('click', function () {
    dupIgnored = true;
    masquerDoublon();
    try { dom.nom.focus(); } catch (e) {}
  });

  /* Confirmation de suppression */
  dom.confirmCancel.addEventListener('click', fermerConfirmation);
  dom.confirmOk.addEventListener('click', confirmerSuppression);
  /* Même protection que le formulaire : on ne ferme que si le geste a été à la
     fois pressé ET relâché sur le fond (évite la fermeture après une sélection). */
  var pointerDownSurConfirm = false;
  dom.confirmOverlay.addEventListener('pointerdown', function (e) {
    pointerDownSurConfirm = (e.target === dom.confirmOverlay);
  });
  dom.confirmOverlay.addEventListener('click', function (e) {
    if (e.target === dom.confirmOverlay && pointerDownSurConfirm) fermerConfirmation();
    pointerDownSurConfirm = false;
  });

  /* Échap ferme la modale ouverte (confirmation prioritaire). */
  function onKeydown(e) {
    if (e.key !== 'Escape') return;
    if (dom.confirmOverlay.classList.contains('cli-open')) { fermerConfirmation(); return; }
    if (dom.formOverlay.classList.contains('cli-open')) { fermerFormulaire(); }
  }
  document.addEventListener('keydown', onKeydown);

  /* ----------------------------------------------------------
     Rafraîchissement automatique sur mutation de la base
     (mutation locale ou pull de synchro) — écouteur window à nettoyer.

     IMPORTANT : ce handler est aussi appelé pour des changements qui ne
     viennent PAS d'une action de l'utilisateur dans ce plugin (un cycle de
     SyncManager en arrière-plan peut émettre l'événement). Si une modale est
     ouverte, reconstruire la liste pendant la saisie est au mieux inutile, au
     pire perturbant (perte de la saisie / fermeture ressentie). On DIFFÈRE
     donc le rafraîchissement tant qu'une modale est ouverte, puis on le rejoue
     à sa fermeture (voir appliquerRafraichissementDiffere).
     ---------------------------------------------------------- */
  function onDbChange() {
    if (modaleOuverte()) {
      refreshDiffere = true; /* on rejouera à la fermeture de la modale */
      return;
    }
    rafraichir();
  }
  var EVENT_CHANGE = (window.ClientsDB && window.ClientsDB.EVENT_CHANGE) || 'clients-db-changed';
  window.addEventListener(EVENT_CHANGE, onDbChange);

  /* Nettoyage exposé : retiré au prochain montage du plugin. */
  window.__cliCleanup = function () {
    window.removeEventListener(EVENT_CHANGE, onDbChange);
    document.removeEventListener('keydown', onKeydown);
    /* Annule les timers anti-autofill encore en attente : sans cela, un timer
       survivant à la navigation toucherait un DOM déjà remplacé. */
    annulerTimersAutofill();
  };

  /* ----------------------------------------------------------
     Anti-autofill — nettoyage défensif du champ de recherche.
     Bien que le champ soit en readonly au montage, certains navigateurs
     peuvent injecter une valeur juste avant/après l'exécution du script. On
     force donc le champ à vide tant que l'utilisateur n'a rien saisi, avec
     quelques passages différés pour couvrir l'autofill tardif de Brave/Chrome.

     ⚠️ CAUSE DU PLANTAGE INTERMITTENT (paste) :
     ces passages différés s'exécutent ~120/400/1000 ms après le montage.
     Si l'utilisateur ouvre la modale et colle du texte dans ce laps de temps,
     le timer touchait le DOM de la barre de recherche pendant la saisie.
     Désormais, tout passage est NO-OP tant qu'une modale est ouverte, et il est
     re-planifié à la fermeture de la modale (voir reprogrammerNettoyageAutofill).
     On conserve aussi les ids de timers pour pouvoir les annuler à l'ouverture
     d'une modale, afin qu'aucun nettoyage différé ne se déclenche pendant la
     saisie / le collage. */
  var timersAutofill = [];

  function annulerTimersAutofill() {
    timersAutofill.forEach(function (id) { clearTimeout(id); });
    timersAutofill = [];
  }

  function nettoyerAutofillRecherche() {
    /* Ne JAMAIS toucher au DOM tant qu'une modale est ouverte : un nettoyage
       pendant la saisie/le collage peut être ressenti comme une fermeture. */
    if (modaleOuverte()) return;
    if (!rechercheSaisie && dom.search && dom.search.value !== '') {
      dom.search.value = '';
      dom.searchClear.classList.remove('cli-visible');
    }
  }

  /* (Re)planifie les passages d'anti-autofill. Appelé au montage et à chaque
     fermeture de modale (au cas où des timers auraient été annulés/sautés). */
  function reprogrammerNettoyageAutofill() {
    annulerTimersAutofill();
    /* Inutile d'insister une fois que l'utilisateur a saisi sa recherche. */
    if (rechercheSaisie) return;
    [120, 400, 1000].forEach(function (delai) {
      var id = setTimeout(function () {
        /* Retire l'id consommé puis tente le nettoyage (no-op si modale ouverte). */
        var i = timersAutofill.indexOf(id);
        if (i !== -1) timersAutofill.splice(i, 1);
        nettoyerAutofillRecherche();
      }, delai);
      timersAutofill.push(id);
    });
  }

  nettoyerAutofillRecherche();
  reprogrammerNettoyageAutofill();

  /* ----------------------------------------------------------
     Démarrage : attendre que la base soit prête puis charger.
     ---------------------------------------------------------- */
  if (window.ClientsDB && typeof window.ClientsDB.ready === 'function') {
    window.ClientsDB.ready()
      .then(rafraichir)
      .catch(function (err) {
        console.error('[Clients] Base indisponible :', err);
        dom.list.innerHTML =
          '<li class="cli-empty"><div class="cli-empty-title">Stockage indisponible</div>' +
          '<div class="cli-empty-msg">Le référentiel local n\'a pas pu être ouvert sur cet appareil.</div></li>';
      });
  } else {
    dom.list.innerHTML =
      '<li class="cli-empty"><div class="cli-empty-title">Module de données absent</div>' +
      '<div class="cli-empty-msg">ClientsDB n\'est pas chargé.</div></li>';
  }

})();
</script>
