<!--
  Plugin : Rapport d'intervention
  Plugin 5 — MUF-WebApp
  Coquille minimale — la structure détaillée du rapport sera dérivée
  de vrais rapports d'intervention fournis ultérieurement.
  Structure IIFE + localStorage
  Compatible Safari iOS (pas de modules ES6, pas de fetch sans polyfill)
-->

<style>
  /* ============================================================
     Styles spécifiques au plugin Rapport d'intervention
     Utilise exclusivement les variables CSS de main.css
     ============================================================ */

  /* En-tête du rapport */
  .ri-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 600px) {
    .ri-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Séparateur de section formulaire */
  .ri-form-sep {
    margin-top: 16px;
  }

  /* Placeholder « champs à définir » */
  .ri-placeholder {
    background-color: var(--color-bg);
    border: 1px dashed var(--color-border);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    color: var(--color-text-muted);
    font-style: italic;
    font-size: var(--font-size-sm);
  }

  /* Boutons actions */
  .ri-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 4px;
  }
  @media (max-width: 599px) {
    .ri-actions { flex-direction: column; }
    .ri-actions .btn { width: 100%; }
  }

  /* Statut / feedback */
  .ri-archive-status {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    font-style: italic;
    margin-top: 8px;
  }
  .ri-archive-status.ri-ok {
    color: #2F855A;
    font-style: normal;
  }
  .ri-archive-status.ri-err {
    color: #E53E3E;
    font-style: normal;
  }
</style>

<!-- ============================================================
     EN-TÊTE DU PLUGIN
     ============================================================ -->
<div class="card mb-24">
  <div class="card-header">
    <h2 class="card-title">Rapport d'intervention</h2>
  </div>
  <div class="card-body">
    <p class="text-muted text-sm">
      Renseignez les informations d'identification de l'intervention.
      Le rapport est sauvegardé automatiquement sur cet appareil.
    </p>
  </div>
</div>

<!-- ============================================================
     SECTION 1 — INFORMATIONS INTERVENTION (formulaire minimal)
     ============================================================ -->
<div class="card mb-24">
  <div class="card-header">
    <h3 class="card-title">Informations intervention</h3>
  </div>
  <div class="card-body">

    <!-- Date -->
    <div class="form-group">
      <label class="form-label" for="ri-date">Date d'intervention</label>
      <input class="form-control" id="ri-date" type="date">
    </div>

    <!-- Client + Machine -->
    <div class="ri-grid ri-form-sep">
      <div class="form-group">
        <label class="form-label" for="ri-client">Client</label>
        <input class="form-control" id="ri-client" type="text"
               placeholder="Nom de l'entreprise" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label" for="ri-machine">Référence machine</label>
        <input class="form-control" id="ri-machine" type="text"
               placeholder="Ex. R230 924" autocomplete="off">
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     SECTION 2 — DÉTAILS DU RAPPORT (placeholder)
     ============================================================ -->
<div class="card mb-24">
  <div class="card-header">
    <h3 class="card-title">Détails du rapport</h3>
  </div>
  <div class="card-body">
    <div class="ri-placeholder" id="ri-placeholder">
      Détails du rapport — champs à définir à partir des rapports réels
    </div>
  </div>
</div>

<!-- ============================================================
     SECTION 3 — ACTIONS
     ============================================================ -->
<div class="card mb-24">
  <div class="card-header">
    <h3 class="card-title">Actions</h3>
  </div>
  <div class="card-body">

    <div class="ri-actions">
      <button class="btn btn-primary" id="ri-btn-copier" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0
               002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Copier
      </button>

      <button class="btn btn-outline btn-sm" id="ri-btn-nouveau" type="button">
        Nouveau rapport
      </button>
    </div>

    <p class="ri-archive-status" id="ri-archive-status"></p>

  </div>
</div>

<!-- ============================================================
     LOGIQUE DU PLUGIN
     ============================================================ -->
<script>
(function () {
  'use strict';

  var CLE_LS    = 'muf_rapport_v1';
  var timerSave = null;

  /* ----------------------------------------------------------
     Helpers DOM
     ---------------------------------------------------------- */
  function el(id) { return document.getElementById(id); }

  /* ----------------------------------------------------------
     Récupération des données du formulaire (3 champs minimaux)
     ---------------------------------------------------------- */
  function lireDonnees() {
    return {
      date:    el('ri-date')    ? el('ri-date').value    : '',
      client:  el('ri-client')  ? el('ri-client').value  : '',
      machine: el('ri-machine') ? el('ri-machine').value : '',
    };
  }

  /* ----------------------------------------------------------
     Restauration des données dans le formulaire
     ---------------------------------------------------------- */
  function appliquerDonnees(data) {
    if (!data) return;
    if (data.date !== undefined && el('ri-date')) {
      el('ri-date').value = data.date;
    }
    if (data.client !== undefined && el('ri-client')) {
      el('ri-client').value = data.client;
    }
    if (data.machine !== undefined && el('ri-machine')) {
      el('ri-machine').value = data.machine;
    }
  }

  /* ----------------------------------------------------------
     Sauvegarde localStorage (debounce 500ms)
     ---------------------------------------------------------- */
  function sauvegarder() {
    clearTimeout(timerSave);
    timerSave = setTimeout(function () {
      try {
        localStorage.setItem(CLE_LS, JSON.stringify(lireDonnees()));
      } catch (e) {
        console.warn('[RapportIntervention] Impossible de sauvegarder :', e);
      }
    }, 500);
  }

  function chargerDepuisLS() {
    try {
      var brut = localStorage.getItem(CLE_LS);
      if (!brut) return null;
      return JSON.parse(brut);
    } catch (e) {
      return null;
    }
  }

  /* ----------------------------------------------------------
     Date du jour par défaut
     ---------------------------------------------------------- */
  function initialiserDate() {
    var champDate = el('ri-date');
    if (!champDate || champDate.value) return;
    var now   = new Date();
    var annee = now.getFullYear();
    var mois  = String(now.getMonth() + 1).padStart(2, '0');
    var jour  = String(now.getDate()).padStart(2, '0');
    champDate.value = annee + '-' + mois + '-' + jour;
  }

  /* ----------------------------------------------------------
     Formatage de la date pour l'affichage : DD/MM/YYYY
     ---------------------------------------------------------- */
  function dateVersAffichage(dateStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-');
    if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
    return dateStr;
  }

  /* ----------------------------------------------------------
     Feedback dans la zone de statut
     ---------------------------------------------------------- */
  function afficherStatut(texte, type) {
    var statusEl = el('ri-archive-status');
    if (!statusEl) return;
    statusEl.textContent = texte;
    statusEl.className   = 'ri-archive-status' +
      (type === 'ok' ? ' ri-ok' : (type === 'err' ? ' ri-err' : ''));
  }

  /* ----------------------------------------------------------
     Copier dans le presse-papier
     Assemble un texte formaté des 3 champs et le copie.
     Compatible Safari iOS : déclenché par un clic utilisateur.
     ---------------------------------------------------------- */
  function copierPressePapier() {
    var data = lireDonnees();
    var texte =
      "Rapport d'intervention\n" +
      'Date : '    + (dateVersAffichage(data.date) || '—') + '\n' +
      'Client : '  + (data.client  || '—') + '\n' +
      'Machine : ' + (data.machine || '—');

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(texte).then(function () {
        afficherStatut('Rapport copié dans le presse-papier.', 'ok');
      }).catch(function (err) {
        console.warn('[RapportIntervention] Échec copie :', err);
        afficherStatut('Impossible de copier le rapport.', 'err');
      });
    } else {
      afficherStatut('Copie non supportée sur ce navigateur.', 'err');
    }
  }

  /* ----------------------------------------------------------
     Nouveau rapport (reset des 3 champs)
     ---------------------------------------------------------- */
  function nouveauRapport() {
    if (!confirm('Créer un nouveau rapport ? Le rapport actuel sera effacé de cet appareil.')) return;

    if (el('ri-date'))    el('ri-date').value = '';
    if (el('ri-client'))  el('ri-client').value = '';
    if (el('ri-machine')) el('ri-machine').value = '';

    afficherStatut('', '');

    try { localStorage.removeItem(CLE_LS); } catch (e) {}

    initialiserDate();
  }

  /* ----------------------------------------------------------
     Branchement des événements
     ---------------------------------------------------------- */
  var champs = ['ri-date', 'ri-client', 'ri-machine'];
  champs.forEach(function (id) {
    var champ = el(id);
    if (!champ) return;
    champ.addEventListener('input', sauvegarder);
    champ.addEventListener('change', sauvegarder);
  });

  var btnCopier   = el('ri-btn-copier');
  var btnNouveau  = el('ri-btn-nouveau');

  if (btnCopier)   btnCopier.addEventListener('click', copierPressePapier);
  if (btnNouveau)  btnNouveau.addEventListener('click', nouveauRapport);

  /* ----------------------------------------------------------
     Initialisation
     ---------------------------------------------------------- */
  var donneesSauvegardees = chargerDepuisLS();
  if (donneesSauvegardees) {
    appliquerDonnees(donneesSauvegardees);
    initialiserDate();
  } else {
    initialiserDate();
  }

})();
</script>
</content>
</invoke>
