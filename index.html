<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MUF-WebApp — Application couteau suisse pour techniciens terrain Multivac France">
  <meta name="theme-color" content="#003A70">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%23003A70'/%3E%3Ctext x='96' y='130' font-family='Inter,Roboto,sans-serif' font-size='100' font-weight='700' text-anchor='middle' fill='white'%3EM%3C/text%3E%3C/svg%3E" type="image/svg+xml">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MUF">

  <!-- Feuille de style principale -->
  <link rel="stylesheet" href="./css/main.css">

  <title>MUF-WebApp</title>
</head>
<body>

  <!-- ======================================================
       WRAPPER GLOBAL
       ====================================================== -->
  <div class="app-wrapper">

    <!-- ====================================================
         SIDEBAR — navigation desktop (≥ 768px)
         ==================================================== -->
    <nav class="sidebar" aria-label="Navigation principale">

      <!-- Logo Multivac -->
      <div class="sidebar-logo">
        <!-- Icône "M" stylisée en SVG — pas d'image externe -->
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"
             aria-hidden="true" focusable="false">
          <rect width="32" height="32" rx="6" fill="rgba(255,255,255,0.15)"/>
          <text x="16" y="23" font-family="Inter,Roboto,sans-serif" font-size="18"
                font-weight="700" text-anchor="middle" fill="white">M</text>
        </svg>
        <span class="sidebar-logo-text">Multivac</span>
        <span class="sidebar-logo-badge">FR</span>
      </div>

      <!-- Liens de navigation — alimentés dynamiquement par app.js -->
      <div class="sidebar-nav" id="sidebar-nav" role="list"
           aria-label="Modules de l'application">
        <!-- Les liens plugins sont insérés ici par JavaScript -->
      </div>

      <!-- Pied de sidebar -->
      <div class="sidebar-footer">
        <span>MUF-WebApp v1.0</span>
        <button id="taxo-gear-btn" title="Éditeur taxonomie" aria-label="Ouvrir l'éditeur de taxonomie">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0
               002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0
               001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0
               00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0
               00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0
               00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0
               00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0
               001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07
               2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
      </div>
    </nav>

    <!-- ====================================================
         CONTENU PRINCIPAL
         ==================================================== -->
    <div class="main-content">

      <!-- En-tête mobile (visible uniquement < 768px) -->
      <header class="mobile-header" role="banner">
        <span class="mobile-header-logo">Multivac</span>
        <span class="mobile-header-badge">FR</span>
        <button id="taxo-gear-btn-mobile" title="Éditeur taxonomie" aria-label="Ouvrir l'éditeur de taxonomie">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0
                 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0
                 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0
                 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0
                 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0
                 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0
                 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0
                 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07
                 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </header>

      <!-- En-tête desktop (visible uniquement ≥ 768px) -->
      <header class="main-header" role="banner">
        <h1 class="main-header-title" id="header-title">Accueil</h1>
      </header>

      <!-- Zone d'injection des plugins -->
      <main id="app-content" role="main" aria-live="polite" aria-atomic="true">
        <!-- Le contenu est chargé dynamiquement par app.js -->
      </main>

    </div><!-- /.main-content -->

  </div><!-- /.app-wrapper -->

  <!-- ========================================================
       BOTTOM NAV — navigation mobile (< 768px)
       ======================================================== -->
  <nav class="bottom-nav" aria-label="Navigation mobile">
    <div class="bottom-nav-inner" id="bottom-nav" role="list">
      <!-- Les liens plugins sont insérés ici par JavaScript -->
    </div>
  </nav>

  <!-- Librairies QR Code - chargées avant parametrage.js -->
  <script src="./js/libs/qrcode.min.js"></script>
  <script src="./js/libs/jsQR.min.js"></script>
  <script src="./js/libs/lz-string.min.js"></script>

  <!-- Module Paramétrage - doit être chargé avant app.js -->
  <script src="./js/parametrage.js"></script>

  <!-- Script principal -->
  <script src="./js/app.js"></script>

  <!-- ========================================================
       ÉDITEUR TAXONOMIE — modal de verrouillage
       ======================================================== -->
  <style id="taxo-lock-style">
    /* Icône engrenage éditeur taxonomie — visible uniquement quand RI actif */
    #taxo-gear-btn {
      display: none;
      margin-top: 10px;
      width: 100%;
      padding: 8px 12px;
      background: #f59e0b;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #1a1a1a;
      font-size: var(--font-size-xs);
      font-weight: 700;
      font-family: Inter, Roboto, sans-serif;
      letter-spacing: 0.3px;
      transition: background 0.2s;
    }
    #taxo-gear-btn::after {
      content: 'Éditeur taxonomie';
    }
    #taxo-gear-btn:hover { background: #d97706; }
    #taxo-gear-btn:active { background: #b45309; }
    #taxo-gear-btn.visible {
      display: flex;
    }

    /* Version mobile — dans le header */
    #taxo-gear-btn-mobile {
      display: none;
      padding: 6px 12px;
      background: #f59e0b;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #1a1a1a;
      font-size: var(--font-size-xs);
      font-weight: 700;
      font-family: Inter, Roboto, sans-serif;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #taxo-gear-btn-mobile.visible {
      display: flex;
    }
    #taxo-gear-btn-mobile:hover,
    #taxo-gear-btn-mobile:active {
      background: #d97706;
      color: #1a1a1a;
    }

    #taxo-lock-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #taxo-lock-overlay.visible { display: flex; }
    #taxo-lock-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 280px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #taxo-lock-box h2 {
      margin: 0 0 8px;
      font-size: var(--font-size-lg);
      color: var(--color-primary);
      font-family: Inter, Roboto, sans-serif;
    }
    #taxo-lock-box p {
      margin: 0 0 20px;
      font-size: 0.85rem;
      color: #666;
      font-family: Inter, Roboto, sans-serif;
    }
    #taxo-lock-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: var(--radius);
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      box-sizing: border-box;
      font-family: monospace;
      transition: border-color 0.2s;
    }
    #taxo-lock-input:focus { border-color: var(--color-primary); }
    #taxo-lock-input.error { border-color: #E53E3E; animation: taxo-shake 0.4s; }
    @keyframes taxo-shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-8px)}
      80%{transform:translateX(8px)}
    }
    #taxo-lock-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: var(--font-size-md);
      font-family: Inter, Roboto, sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    #taxo-lock-btn:hover { background: var(--color-primary-dark); }
    #taxo-lock-cancel {
      margin-top: 10px;
      background: none;
      border: none;
      color: #999;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: Inter, Roboto, sans-serif;
      text-decoration: underline;
    }
  </style>

  <div id="taxo-lock-overlay" role="dialog" aria-modal="true" aria-label="Accès éditeur taxonomie">
    <div id="taxo-lock-box">
      <h2>Éditeur Taxonomie</h2>
      <p>Accès restreint — saisir le code</p>
      <input id="taxo-lock-input" type="password" maxlength="4" inputmode="numeric" autocomplete="off" placeholder="••••">
      <button id="taxo-lock-btn">Valider</button><br>
      <button id="taxo-lock-cancel">Annuler</button>
    </div>
  </div>
  <script>
  (function() {
    var overlay   = document.getElementById('taxo-lock-overlay');
    var input     = document.getElementById('taxo-lock-input');
    var btn       = document.getElementById('taxo-lock-btn');
    var cancelBtn = document.getElementById('taxo-lock-cancel');

    function valider() {
      if (input.value === '1221') {
        overlay.classList.remove('visible');
        input.value = '';
        window.location.hash = '#editeur-taxonomie';
      } else {
        input.classList.add('error');
        input.value = '';
        setTimeout(function() { input.classList.remove('error'); }, 500);
        input.focus();
      }
    }

    btn.addEventListener('click', valider);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') valider();
      if (e.key === 'Escape') {
        overlay.classList.remove('visible');
        input.value = '';
      }
    });
    cancelBtn.addEventListener('click', function() {
      overlay.classList.remove('visible');
      input.value = '';
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        overlay.classList.remove('visible');
        input.value = '';
      }
    });

    window.__ouvrirVerrouTaxo = function() {
      overlay.classList.add('visible');
      setTimeout(function() { input.focus(); }, 50);
    };

    var gearBtn = document.getElementById('taxo-gear-btn');
    var gearBtnMobile = document.getElementById('taxo-gear-btn-mobile');
    if (gearBtn) gearBtn.addEventListener('click', function() {
      if (typeof window.__ouvrirVerrouTaxo === 'function') window.__ouvrirVerrouTaxo();
    });
    if (gearBtnMobile) gearBtnMobile.addEventListener('click', function() {
      if (typeof window.__ouvrirVerrouTaxo === 'function') window.__ouvrirVerrouTaxo();
    });
  })();
  </script>

</body>
</html>
